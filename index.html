<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Portfolio JS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500;600&display=swap');
:root{
  --bg:#f0f0eb;--card:#ffffff;--border:#e0e0d6;
  --text:#111827;--muted:#64748b;--subtle:#94a3b8;
  --green:#16a34a;--gbg:#f0fdf4;--gborder:#bbf7d0;
  --red:#dc2626;--rbg:#fef2f2;--rborder:#fecaca;
  --blue:#1d4ed8;--bbg:#eff6ff;--bborder:#bfdbfe;
  --amber:#d97706;--abg:#fffbeb;--aborder:#fde68a;
  --purple:#7c3aed;--pbg:#f5f3ff;--pborder:#ddd6fe;
  --shadow:0 1px 3px rgba(0,0,0,.05),0 4px 12px rgba(0,0,0,.04);
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
.n{font-family:'Roboto Mono',monospace;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)}
.cardlink{transition:border-color .15s,box-shadow .15s,transform .12s;cursor:pointer}
.cardlink:hover{border-color:#c0c0b4;box-shadow:0 2px 10px rgba(0,0,0,.08);transform:translateY(-1px)}
button{cursor:pointer;font-family:'Inter',sans-serif}
input,select,textarea{font-family:'Roboto Mono',monospace;outline:none;color:var(--text)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px}
.fade{animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--muted)}

/* ── Header ── */
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:20px 28px 0;position:sticky;top:0;z-index:20;box-shadow:0 1px 0 var(--border)}
.hdr-in{max-width:980px;margin:0 auto}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:4px}
.big-val{font-size:clamp(22px,5vw,38px);font-weight:800;letter-spacing:-1.5px;line-height:1;word-break:break-all;max-width:100%}
.big-pnl{font-size:clamp(13px,2.5vw,18px);font-weight:700;letter-spacing:-.5px;word-break:break-all}
.hdr-meta{font-size:12px;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap;margin-top:4px}
.hdr-meta b{font-weight:700}

/* Currency toggle */
.cur-wrap{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:3px;gap:2px}
.cur-btn{font-size:12px;font-weight:600;padding:5px 15px;border-radius:7px;border:none;background:transparent;color:var(--muted);transition:all .15s}
.cur-btn.on{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1)}

.periods{display:flex;gap:4px;margin-top:12px;flex-wrap:wrap}
.pbtn{font-size:11px;font-weight:500;padding:4px 13px;border-radius:20px;border:1px solid transparent;background:transparent;color:var(--muted);transition:all .15s}
.pbtn.on{background:#fff;border-color:var(--border);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.tabs{display:flex;margin-top:14px;border-bottom:2px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{height:0}
.tbtn{font-size:13px;font-weight:600;padding:9px 16px;border:none;background:transparent;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.tbtn.on{color:var(--text);border-bottom-color:var(--text)}

.content{padding:22px 28px 60px;max-width:980px;margin:0 auto}

/* Stat cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:11px;margin-bottom:18px}
.sc{padding:16px 18px;overflow:hidden}
.sc-l{font-size:9px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--subtle);margin-bottom:7px}
.sc-v{font-size:clamp(15px,3.2vw,20px);font-weight:700;letter-spacing:-.5px;line-height:1.1;word-break:break-all;overflow-wrap:break-word}
.sc-s{font-size:11px;font-weight:500;color:var(--muted);margin-top:4px}

.th{display:grid;gap:8px;padding:8px 18px;font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--subtle);border-bottom:1px solid var(--border);background:#fafaf8}
.tr{display:grid;gap:8px;padding:11px 18px;border-bottom:1px solid #f2f2ea;align-items:center}
.tr:last-child{border-bottom:0}
.tr:hover{background:#fafaf8}

/* Platform block — 3 cajones */
.pb{margin-bottom:20px;overflow:hidden}
.pb-head{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;background:#fafaf8;border-bottom:1px solid var(--border)}
.pb-head .pb-total{font-size:clamp(16px,3.5vw,22px);font-weight:800;letter-spacing:-.5px;word-break:break-all}

/* Cajón section */
.cajon{border-bottom:1px solid var(--border)}
.cajon:last-child{border-bottom:0}
.cajon-head{padding:11px 18px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:#fcfcf8}
.cajon-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text)}
.cajon-title .ico{font-size:18px}
.cajon-title .lbl{color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:none}
.cajon-actions{display:flex;gap:6px;flex-wrap:wrap}
.cajon-body{padding:0}

/* Liquidez display */
.liq-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.liq-cell{padding:13px 18px;border-right:1px solid #f0f0e8}
.liq-cell:last-child{border-right:0}
.liq-cell-lbl{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--subtle);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.liq-cell-val{font-size:18px;font-weight:700;letter-spacing:-.4px}
.liq-cell-sub{font-size:10px;color:var(--muted);margin-top:2px}

/* Sub-account header */
.subacc-h{padding:10px 18px;background:#f5f5ee;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.subacc-h-name{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.subacc-h-tot{font-family:'Roboto Mono',monospace;font-size:14px;font-weight:700;letter-spacing:-.2px}

/* Buttons */
.btn{font-size:13px;font-weight:700;padding:10px 20px;border-radius:9px;border:none;transition:all .15s;letter-spacing:.1px}
.btn-dark{background:var(--text);color:#fff}.btn-dark:hover{opacity:.86}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{opacity:.86}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{opacity:.86}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{opacity:.86}
.btn-purple{background:var(--purple);color:#fff}.btn-purple:hover{opacity:.86}
.btn-amber{background:var(--amber);color:#fff}.btn-amber:hover{opacity:.86}
.btn-red-s{background:var(--rbg);color:var(--red);border:1px solid var(--rborder);font-size:11px;font-weight:600;padding:5px 12px;border-radius:7px}
.btn-red-s:hover{background:#fee2e2}
.btn-sm{font-size:11px;font-weight:600;padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:#fff;color:var(--muted)}
.btn-sm:hover{border-color:#999;color:var(--text)}
.btn-buy{background:var(--gbg);color:var(--green);border:1px solid var(--gborder);font-size:11px;font-weight:700;padding:6px 12px;border-radius:7px}
.btn-buy:hover{background:#dcfce7}
.btn-sell{background:var(--abg);color:var(--amber);border:1px solid var(--aborder);font-size:11px;font-weight:700;padding:6px 12px;border-radius:7px}
.btn-sell:hover{background:#fef3c7}
.btn-add{background:var(--bbg);color:var(--blue);border:1px solid var(--bborder);font-size:11px;font-weight:700;padding:6px 12px;border-radius:7px}
.btn-add:hover{background:#dbeafe}
.btn-extra{background:var(--pbg);color:var(--purple);border:1px solid var(--pborder);font-size:11px;font-weight:700;padding:6px 12px;border-radius:7px}
.btn-extra:hover{background:#ede9fe}
.del{background:transparent;border:none;color:#d1d5db;font-size:14px;padding:3px 7px;border-radius:5px;transition:all .15s}
.del:hover{color:var(--red);background:var(--rbg)}

.pinp{width:80px;font-size:12px;background:var(--bbg);border:1px solid var(--bborder);border-radius:6px;padding:3px 8px;color:var(--blue);text-align:right;font-family:'Roboto Mono',monospace;font-weight:500;transition:all .15s}
.pinp:focus{border-color:var(--blue);box-shadow:0 0 0 2px #bfdbfe66}
.pinp-wrap{display:inline-flex;align-items:center;gap:3px}
.pinp-ok{font-size:10px;font-weight:700;padding:3px 6px;border-radius:5px;border:1px solid var(--green);background:var(--gbg);color:var(--green);cursor:pointer;flex-shrink:0;line-height:1}
.pinp:focus{border-color:var(--blue);box-shadow:0 0 0 2px #bfdbfe66}

/* Forms */
.fg{margin-bottom:13px}
.fl{display:block;font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.fi{width:100%;font-size:13px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--text);transition:all .15s;font-family:'Roboto Mono',monospace}
.fi:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px #bfdbfe44}
.fi-row{display:flex;gap:10px;flex-wrap:wrap}
.fi-row .fg{flex:1;min-width:100px}

/* Notices */
.notice{border-radius:9px;padding:12px 15px;font-size:13px;margin-top:12px;line-height:1.6;font-weight:500}
.n-ok{background:var(--gbg);border:1px solid var(--gborder);color:#166534}
.n-warn{background:var(--abg);border:1px solid var(--aborder);color:#92400e}
.n-err{background:var(--rbg);border:1px solid var(--rborder);color:#991b1b}
.n-info{background:var(--bbg);border:1px solid var(--bborder);color:#1e40af}

.tip{background:var(--bbg);border:1px solid var(--bborder);color:#1e40af;border-radius:9px;padding:10px 14px;font-size:12px;line-height:1.55;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
.tip-icon{font-size:16px;flex-shrink:0;line-height:1.3}

/* Capital */
.cap-form{background:var(--bg);border-radius:10px;padding:16px 18px;margin-bottom:16px;border:1px solid var(--border)}
.cap-type-in{color:var(--green);font-weight:700;font-size:12px;background:var(--gbg);padding:2px 9px;border-radius:12px;border:1px solid var(--gborder)}
.cap-type-out{color:var(--red);font-weight:700;font-size:12px;background:var(--rbg);padding:2px 9px;border-radius:12px;border:1px solid var(--rborder)}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.mo-box{background:#fff;border-radius:16px;padding:24px;max-width:520px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:92vh;overflow-y:auto}
.mo-box h3{font-size:17px;font-weight:700;margin-bottom:8px}
.mo-box p{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.mo-btns{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
.mo-box-lg{max-width:780px}
.pdf-preview{background:#f3f3ee;border:1px solid var(--border);border-radius:9px;padding:16px;max-height:55vh;overflow-y:auto;margin-bottom:14px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;font-size:14px;font-weight:700;padding:13px 26px;border-radius:12px;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:9999;white-space:nowrap;max-width:90vw;text-overflow:ellipsis;overflow:hidden}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

.badge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 8px;border-radius:5px}

/* Pie */
.dist{display:flex;gap:14px;flex-wrap:wrap}
.pie-card{padding:18px;flex:0 0 190px;min-width:170px}
.plist{flex:1;min-width:200px;display:flex;flex-direction:column;gap:8px}

.prog-wrap{height:4px;background:var(--border);border-radius:3px;margin-top:5px;overflow:hidden}
.prog{height:100%;border-radius:3px;transition:width .4s ease}

/* Hitos */
.hito{background:#fff;border:1px solid var(--border);border-radius:11px;padding:14px 16px;margin-bottom:10px}
.hito-bar{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin-top:8px}
.hito-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),#22c55e);transition:width .6s ease}

/* ── Bottom Navigation (móvil) ── */
.bottom-nav{display:none}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:transparent;border:none;color:var(--muted);padding:7px 4px 8px;cursor:pointer;transition:all .15s;border-top:2px solid transparent;min-height:54px}
.bnav-btn.on{color:var(--text);border-top-color:var(--text);background:linear-gradient(to bottom,#fafaf8,#fff)}
.bnav-ico{font-size:20px;line-height:1}
.bnav-lbl{font-size:10px;font-weight:600;letter-spacing:.2px}

/* ── Contraste cajones (Liquidez · Activos · Extras) ── */
.cajon-head{background:#f3f4f6 !important;border-bottom:1px solid #e5e7eb;font-weight:700}
.cajon-head .cajon-title{color:#374151}
.cajon-title .lbl{color:#6b7280}

/* ── Cards móviles para tablas (assets, capital, etc.) ── */
.mcard{display:none}

/* ── Plataformas: gestión ── */
.plat-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn-plat-action{font-size:11px;font-weight:600;padding:5px 11px;border-radius:7px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;transition:all .15s}
.btn-plat-action:hover{border-color:#999;color:var(--text)}
.btn-plat-del{background:var(--rbg);color:var(--red);border-color:var(--rborder)}
.btn-plat-del:hover{background:#fee2e2}

@media(max-width:640px){
  .hdr{padding:14px 14px 0}.content{padding:14px 14px 100px}
  .pb-head{padding:12px 14px}
  .th,.tr,.cajon-head{padding:9px 12px}
  .stats{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:9px}
  .sc{padding:13px 14px}
  .liq-cell{padding:11px 13px}

  /* Ocultar tabs desktop, mostrar bottom-nav */
  .tabs-desktop{display:none}
  .bottom-nav{
    display:flex;
    position:fixed;left:0;right:0;bottom:0;
    background:rgba(255,255,255,.97);
    backdrop-filter:saturate(180%) blur(12px);
    -webkit-backdrop-filter:saturate(180%) blur(12px);
    border-top:1px solid var(--border);
    z-index:50;
    padding-bottom:env(safe-area-inset-bottom,0);
    box-shadow:0 -2px 8px rgba(0,0,0,.04);
  }

  /* Tablas → cards en móvil: ocultar el grid, mostrar cards */
  .table-mobile-cards .th,
  .table-mobile-cards .tr-mobile-hide{display:none !important}
  .mcard{
    display:flex;flex-direction:column;gap:6px;
    background:#fff;border:1px solid var(--border);border-radius:12px;
    padding:12px 14px;margin-bottom:8px;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .mcard-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .mcard-row.bord{border-top:1px solid #f0f0e8;padding-top:7px;margin-top:3px}
  .mcard-name{font-size:14px;font-weight:700;color:var(--text)}
  .mcard-sub{font-size:10px;color:var(--subtle);font-weight:500;letter-spacing:.5px;text-transform:uppercase}
  .mcard-val{font-family:'Roboto Mono',monospace;font-size:13px;font-weight:700}
  .mcard-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;margin-top:4px}
  .mcard-actions button{min-height:36px;padding:7px 12px;font-size:12px;font-weight:600}
  .mcard-actions .pinp-wrap input{font-size:14px;min-height:34px}
  .mcard-actions .pinp-wrap button{min-width:34px;min-height:34px}

  /* Botones de acción más grandes para pulgar */
  .btn-buy,.btn-sell,.btn-add,.btn-extra{min-height:36px;font-size:12px}
  .pinp{font-size:13px;min-height:32px}
}
@media(max-width:480px){
  .stats{grid-template-columns:1fr 1fr}
  .sc{padding:12px}
  .bnav-lbl{font-size:9px}
}
</style>
</head>
<body>
<!-- Pantalla de bloqueo (clave: 8959) -->
<div id="lock-screen" style="position:fixed;inset:0;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px">
  <div style="background:#fff;border-radius:18px;padding:34px 30px;max-width:340px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.4);text-align:center">
    <div style="font-size:48px;margin-bottom:12px">🔒</div>
    <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#94a3b8;margin-bottom:8px">PORTFOLIO JS</div>
    <div style="font-size:18px;font-weight:800;color:#0f172a;margin-bottom:6px">Acceso seguro</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:22px;line-height:1.5">Introduce tu clave de acceso para continuar</div>
    <input id="lock-pin" type="password" inputmode="numeric" pattern="[0-9]*" autocomplete="off"
      placeholder="••••" maxlength="8"
      style="width:100%;font-size:24px;font-weight:700;text-align:center;letter-spacing:8px;padding:14px;border:2px solid #e2e8f0;border-radius:12px;color:#0f172a;font-family:'Roboto Mono',monospace;margin-bottom:14px;outline:none;background:#f8fafc"/>
    <div id="lock-error" style="display:none;color:#dc2626;font-size:12px;font-weight:600;margin-bottom:10px">❌ Clave incorrecta</div>
    <button id="lock-btn" style="width:100%;padding:13px;background:#0f172a;color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.3px">Desbloquear</button>
    <div style="font-size:10px;color:#cbd5e1;margin-top:18px">Tus datos siguen guardados localmente</div>
  </div>
</div>
<script>
(function(){
  // Pantalla de bloqueo: solo se desbloquea con la clave correcta
  const PIN_CORRECT="8959";
  const lockScreen=document.getElementById("lock-screen");
  const pinInput=document.getElementById("lock-pin");
  const lockBtn=document.getElementById("lock-btn");
  const errBox=document.getElementById("lock-error");
  const tryUnlock=()=>{
    const v=(pinInput.value||"").trim();
    if(v===PIN_CORRECT){
      lockScreen.style.transition="opacity .3s";
      lockScreen.style.opacity="0";
      setTimeout(()=>{lockScreen.remove();},300);
      try{sessionStorage.setItem("portfolio_unlocked","1");}catch(e){}
      // Intentar cargar datos desde Google Drive al desbloquear
      setTimeout(()=>{
        if(typeof gdriveLoad==="function")gdriveLoad();
      },500);
    }else{
      errBox.style.display="block";
      pinInput.value="";
      pinInput.style.borderColor="#dc2626";
      setTimeout(()=>{pinInput.style.borderColor="#e2e8f0";errBox.style.display="none";},2000);
    }
  };
  // Auto-unlock si ya se introdujo la clave en esta sesión
  try{if(sessionStorage.getItem("portfolio_unlocked")==="1"){
    lockScreen.remove();
    // También intentar sync al recargar con sesión activa
    setTimeout(()=>{if(typeof gdriveLoad==="function")gdriveLoad();},800);
  }}catch(e){}
  lockBtn&&lockBtn.addEventListener("click",tryUnlock);
  pinInput&&pinInput.addEventListener("keydown",(e)=>{if(e.key==="Enter"){e.preventDefault();tryUnlock();}});
  setTimeout(()=>{pinInput&&pinInput.focus();},100);
})();
</script>

<div id="app"></div>

<script>
//================================================================
// PORTFOLIO JS — MODELO DE CAJONES (BUCKETS)
// Cada plataforma tiene 3 cajones: Liquidez · Activos · Extras
//================================================================

// ── Plataformas por defecto (usuario puede añadir/eliminar) ──
const DEFAULT_PLATS=[
  {id:"tr",      name:"Trade Republic",     tipo:"Acciones / ETF",   emoji:"📈",base:"EUR",color:"#16a34a"},

const PLATS=new Proxy({},{
  get(_,prop){
    const arr=getPlats();
    if(prop==="length")return arr.length;
    if(prop===Symbol.iterator)return arr[Symbol.iterator].bind(arr);
    if(typeof prop==="string"&&!isNaN(prop))return arr[prop];
    if(typeof arr[prop]==="function")return arr[prop].bind(arr);
    return arr[prop];
  },
  has(_,prop){return prop in getPlats();},
  ownKeys(){return Reflect.ownKeys(getPlats());},
  getOwnPropertyDescriptor(_,prop){return Object.getOwnPropertyDescriptor(getPlats(),prop);},
});

async function gdriveLoad(){
  const el=document.getElementById("sync-status");
  if(el){el.textContent="⏳ Cargando...";el.style.color="var(--blue)";}
  try{
    showToast("⏳ Conectando con Google Drive...");
    const url=GDRIVE_URL+"?action=load&ts="+Date.now();
    const res=await fetch(url,{method:"GET",mode:"cors"});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const data=await res.json();

    if(data&&data.ok===false){
      throw new Error(data.error||"Error en el servidor");
    }

    if(data&&data.ok===true&&data.payload&&Object.keys(data.payload).length>0){
      Object.entries(data.payload).forEach(([pid,pdata])=>{
        if(pdata&&typeof pdata==="object"&&!Array.isArray(pdata)){

function parseDec(v){
  if(v==null||v==="")return 0;
  // Quitar símbolos de moneda y espacios (incluido NBSP)
  let s=String(v).trim().replace(/[€$£¥\s\u00A0]/g,"");
  if(!s)return 0;
  // Conservar solo dígitos, separadores y signo
  s=s.replace(/[^0-9.,\-]/g,"");
  if(!s||s==="-"||s===".")return 0;
  // Determinar signo
  const negative=s.startsWith("-");
  if(negative)s=s.slice(1);

  const hasDot=s.includes(".");
  const hasComma=s.includes(",");

  if(hasDot&&hasComma){
    // Ambos separadores → el ÚLTIMO es decimal, el otro es miles
    if(s.lastIndexOf(",")>s.lastIndexOf(".")){
      // ES: 1.250,75 → punto=miles, coma=decimal
      s=s.replace(/\./g,"").replace(",",".");
    }else{
      // US: 1,250.75 → coma=miles, punto=decimal
      s=s.replace(/,/g,"");
    }
  }else if(hasDot){
    // Solo punto: heurística
    const parts=s.split(".");
    if(parts.length>2){
      // Múltiples puntos → todos miles: 1.250.000
      s=s.replace(/\./g,"");
    }else if(parts[0]==="0"||/^0+$/.test(parts[0])){
      // 0.012, 0.5 → siempre decimal (no tiene sentido como miles)
      // s ya está en formato decimal
    }else if(parts[1].length===3&&parts[0].length>=1&&parts[0].length<=3){
      // 1 a 3 dígitos antes y exactamente 3 detrás → MILES (75.000, 1.250)
      s=s.replace(".","");
    }
    // sino: decimal normal (75.50, 1234.5)
  }else if(hasComma){
    // Solo coma: misma heurística
    const parts=s.split(",");
    if(parts.length>2){
      s=s.replace(/,/g,"");
    }else if(parts[0]==="0"||/^0+$/.test(parts[0])){
      // 0,012 → decimal
      s=s.replace(",",".");
    }else if(parts[1].length===3&&parts[0].length>=1&&parts[0].length<=3){
      // 75,000 → MILES
      s=s.replace(",","");
    }else{
      // 75,50 → DECIMAL
      s=s.replace(",",".");
    }
  }
  const n=parseFloat(s);
  if(isNaN(n))return 0;
  return negative?-n:n;
}

function parseMoneyInput(v){return parseDec(v);}

function emptyPlatform(platId){

function emptyPlatforms(){

}

// Acceso unificado — nueva estructura: plataforma tiene {liquidity,extras,subs}
// - sin subId: devuelve plataforma completa (para liquidez/extras)
// - con subId: devuelve la sub (para activos)
function getBucket(state,platId,subId){
  const p=state.platforms?state.platforms[platId]:null;
  if(!p)return{liquidity:{eur:0,usd:0},extras:[],assets:[],subs:{}};
  if(subId){
    // Compatibilidad: si la plat tiene subs (nuevo), devolver sub
    if(p.subs)return p.subs[subId]||{assets:[]};
    // Legacy: plat plana
    return{assets:p.assets||[]};
  }
  return p;
}

// Asegura estructura nueva por plataforma (migracion)
function ensurePlatformSubs(platforms,platId){
  if(!platforms[platId])return;
  const subs=getSubsFor(platId);
  const p=platforms[platId];
  if(!p.subs){
    platforms[platId]={liquidity:p.liquidity||{eur:0,usd:0},extras:p.extras||[],subs:{spot:{assets:p.assets||[]}}};
  }else if(!p.liquidity){
    platforms[platId]={liquidity:{eur:0,usd:0},extras:[],subs:p.subs};
  }
  subs.forEach(s=>{
    if(!platforms[platId].subs[s.id])platforms[platId].subs[s.id]={assets:[]};
  });
}

//================================================================
// MIGRACIÓN: del modelo viejo (transactions) al modelo de cajones
//================================================================
function calcLegacyPositions(txs){
  // Calcula posiciones netas (símbolo→{units,cost,name}) desde un array de transacciones
  const pos={};
  const sorted=[...txs].sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  for(const t of sorted){
    if(t.isCash)continue;
    if(!pos[t.symbol])pos[t.symbol]={symbol:t.symbol,name:t.name||t.symbol,units:0,cost:0};
    if(t.type==="BUY"){pos[t.symbol].units+=t.units;pos[t.symbol].cost+=t.cost;}
    else if(t.type==="SELL"&&pos[t.symbol].units>0){
      const r=Math.min(t.units/pos[t.symbol].units,1);
      pos[t.symbol].cost*=(1-r);
      pos[t.symbol].units=Math.max(0,pos[t.symbol].units-t.units);
    }
  }
  return pos;
}

function migrateOldData(oldState){
  // Convierte datos del modelo v1 (transactions) al modelo v2 (cajones)
  if(!oldState)return null;
  const platforms=emptyPlatforms();

  // Map plataforma legacy → nueva
  const legacyMap={"cdc-spot":["cdc","spot"],"cdc-stake":["cdc","stake"],"cdc-card":["cdc","card"]};

  // 1) Procesar transacciones por plataforma
  const txsByPlat={};
  Object.values(oldState.transactions||{}).forEach(t=>{
    let pid=t.platId,sub;
    if(legacyMap[pid]){[pid,sub]=legacyMap[pid];}
    else if(pid==="cdc")sub=t.subAccount||"spot";
    const k=pid+(sub?"|"+sub:"");
    if(!txsByPlat[k])txsByPlat[k]={platId:pid,subId:sub,txs:[]};
    txsByPlat[k].txs.push(t);
  });

  Object.values(txsByPlat).forEach(({platId,subId,txs})=>{
    const bucket=getBucket({platforms},platId,subId);
    if(!bucket)return;

    // Calcular posiciones netas → assets
    const pos=calcLegacyPositions(txs);
    Object.values(pos).forEach(p=>{
      if(p.units<0.000001)return;
      const avg=p.cost/p.units;
      const moneda=(txs.find(x=>x.symbol===p.symbol)||{}).moneda||platBy(platId).base;
      const priceKey=(platId==="cdc"?"cdc":platId)+"_"+p.symbol;
      const currentPrice=(oldState.currentPrices||{})[priceKey]??avg;
      bucket.assets.push({
        id:uid(),simbolo:p.symbol,nombre:p.name,
        unidades:p.units,precioMedio:avg,
        precioActual:currentPrice,moneda,
        fecha:txs.filter(x=>x.symbol===p.symbol&&x.type==="BUY")[0]?.date||today()
      });
    });

    // Calcular liquidez: cash inflows - buys + sells - (out outflows)
    const cashTxs=txs.filter(t=>t.isCash);
    const inflows=cashTxs.reduce((s,t)=>s+(t.amount||0),0);
    const buyTotal=txs.filter(t=>t.type==="BUY").reduce((s,t)=>s+t.cost,0);
    const sellTotal=txs.filter(t=>t.type==="SELL").reduce((s,t)=>s+t.cost,0);
    const cash=Math.max(0,inflows-buyTotal+sellTotal);
    if(cash>0){
      const moneda=cashTxs[0]?.moneda||platBy(platId).base;
      if(moneda==="EUR")bucket.liquidity.eur+=cash;
      else bucket.liquidity.usd+=cash;
    }

    // Stockperks/Dividendos/Intereses → extras
    const TIPO_EXTRAS={
      "STOCKPERK":"stockperk",
      "DIVIDEND":"dividendo",
      "INTEREST_PAYMENT":"interés",
    };
    cashTxs.filter(t=>TIPO_EXTRAS[t.type]&&t.amount>0).forEach(t=>{
      bucket.extras.push({
        id:uid(),simbolo:"EUR",nombre:t.name||TIPO_EXTRAS[t.type],
        unidades:1,valorUnitario:t.amount,
        moneda:t.moneda||"EUR",
        tipo:TIPO_EXTRAS[t.type],
        fecha:t.date||today()
      });
    });
  });

  // 2) Procesar manualAssets viejos → assets
  (oldState.manualAssets||[]).forEach(a=>{
    let pid=a.platId,sub=a.subAccount;
    if(legacyMap[pid]){[pid,sub]=legacyMap[pid];}
    else if(pid==="cdc"&&!sub)sub="spot";
    const bucket=getBucket({platforms},pid,sub);
    if(!bucket)return;
    bucket.assets.push({
      id:a.id||uid(),simbolo:a.simbolo,nombre:a.nombre,
      unidades:a.unidades,precioMedio:a.precioMedio,
      precioActual:a.precioActual,moneda:a.moneda||platBy(pid).base,
      fecha:a.fecha||today()
    });
  });

  return platforms;
}

          const p=merged.platforms[pid];
          // MIGRACIÓN: estructura antigua con subs que tienen liquidez propia
          if(p.subs&&Object.values(p.subs).some(b=>b.liquidity||b.extras)){
            const aggLiq={eur:0,usd:0};const aggExtras=[];const newSubs={};
            Object.entries(p.subs).forEach(([sid,sub])=>{
              if(sid==="extras")return; // sub "extras" era un error
              aggLiq.eur+=(sub.liquidity?.eur||0);
              aggLiq.usd+=(sub.liquidity?.usd||0);
              aggExtras.push(...(sub.extras||[]));
              newSubs[sid]={assets:sub.assets||[]};
            });
            merged.platforms[pid]={
              liquidity:{eur:aggLiq.eur+(p.liquidity?.eur||0),usd:aggLiq.usd+(p.liquidity?.usd||0)},
              extras:[...(p.extras||[]),...aggExtras],
              subs:newSubs
            };
          }else if(!p.subs){
            // Estructura muy antigua (plana)
            merged.platforms[pid]={
              liquidity:p.liquidity||{eur:0,usd:0},
              extras:p.extras||[],
              subs:{spot:{assets:p.assets||[]},futuros:{assets:[]}}
            };
          }else if(!p.liquidity){
            // Tiene subs pero sin liquidez en raíz: añadir liquidity y extras
            merged.platforms[pid]={
              liquidity:{eur:0,usd:0},
              extras:[],
              subs:p.subs
            };
          }
          // Asegurar que existen todas las subs requeridas
          subs.forEach(s=>{
            if(!merged.platforms[pid].subs[s.id])merged.platforms[pid].subs[s.id]={assets:[]};
          });
          // Limpiar sub "extras" si quedó del modelo antiguo
          if(merged.platforms[pid].subs&&merged.platforms[pid].subs.extras){
            const extLiq=merged.platforms[pid].subs.extras;
            if(extLiq.extras&&extLiq.extras.length){
              merged.platforms[pid].extras=[...(merged.platforms[pid].extras||[]),...extLiq.extras];
            }
            delete merged.platforms[pid].subs.extras;
          }
        }
      });
      return merged;
    }

    // Sin datos previos: estado base limpio
    const base=getBaseState(ACTIVE_PROFILE);
    base._v_2026_reset=true;
    return base;
  }catch(e){
    console.warn("loadState error:",e);
    return getBaseState(ACTIVE_PROFILE);
  }
}

function loadProfileState(profileId){

function loadGlobalState(){
  const j=loadProfileState("jorge");
  const r=loadProfileState("raquel");
  const base=getBaseState("global");
  base._isGlobal=true;

  // Combinar plataformas: usar la unión de plats de Jorge y Raquel
  const allPlatIds=new Set([...(j.platsList||[]).map(p=>p.id),...(r.platsList||[]).map(p=>p.id)]);
  const allPlats=[...DEFAULT_PLATS];
  // Añadir plats custom de cualquier perfil
  [j,r].forEach(prof=>{(prof.platsList||[]).forEach(p=>{if(!allPlats.find(x=>x.id===p.id))allPlats.push(p);});});
  base.platsList=allPlats;

  // Merge nueva estructura: liquidez y extras a nivel plataforma, subs solo assets
  const platforms={};
  allPlats.forEach(plat=>{
    const subsJ=(j.platsList?.find(p=>p.id===plat.id)?.enabledSubs)||[];
    const subsR=(r.platsList?.find(p=>p.id===plat.id)?.enabledSubs)||[];
    const enabled=[...new Set([...subsJ,...subsR])];
    const subs=[...STANDARD_SUBS,...OPTIONAL_SUBS.filter(s=>enabled.includes(s.id))];
    const pj=j.platforms?.[plat.id]||emptyPlatform(plat.id);
    const pr=r.platforms?.[plat.id]||emptyPlatform(plat.id);

    // Sumar liquidez de ambos perfiles
    const liq={
      eur:(pj.liquidity?.eur||0)+(pr.liquidity?.eur||0),
      usd:(pj.liquidity?.usd||0)+(pr.liquidity?.usd||0),
    };
    // Combinar extras
    const extras=[
      ...(pj.extras||[]).map(e=>({...e,_owner:"Jorge"})),
      ...(pr.extras||[]).map(e=>({...e,_owner:"Raquel"})),
    ];
    // Combinar activos por sub
    const subsObj={};
    subs.forEach(sub=>{
      const assetsJ=(pj.subs?.[sub.id]?.assets||[]).map(a=>({...a,_owner:"Jorge"}));
      const assetsR=(pr.subs?.[sub.id]?.assets||[]).map(a=>({...a,_owner:"Raquel"}));
      subsObj[sub.id]={assets:[...assetsJ,...assetsR]};
    });
    platforms[plat.id]={liquidity:liq,extras,subs:subsObj};
  });

  return{
    ...base,
    platforms,
    capitalMovements:[
      ...(j.capitalMovements||[]).map(m=>({...m,_owner:"Jorge"})),
      ...(r.capitalMovements||[]).map(m=>({...m,_owner:"Raquel"})),
    ],
    realizedSales:[
      ...(j.realizedSales||[]).map(s=>({...s,_owner:"Jorge"})),
      ...(r.realizedSales||[]).map(s=>({...s,_owner:"Raquel"})),
    ],
    objetivos:[
      ...(j.objetivos||[]).map(o=>({...o,_owner:"Jorge"})),
      ...(r.objetivos||[]).map(o=>({...o,_owner:"Raquel"})),
    ],
    moneda:j.moneda||"EUR",
  };
}

function emptyBucketSummary(){
  return{liqEur:0,liqEurOnly:0,liqUsdOnly:0,assetsInv:0,assetsCur:0,
    assetsPnl:0,assetsPct:0,extrasVal:0,total:0,subs:{}};
}

// Resumen de una subcuenta de activos (solo assets, sin liquidez propia)
function subSummary(sub){
  if(!sub)return{assetsInv:0,assetsCur:0,assetsPnl:0,assetsPct:0,total:0};
  let assetsInv=0,assetsCur=0;
  (sub.assets||[]).forEach(a=>{
    assetsInv+=toEUR(a.unidades*a.precioMedio,a.moneda);
    assetsCur+=toEUR(a.unidades*a.precioActual,a.moneda);
  });
  return{assetsInv,assetsCur,assetsPnl:assetsCur-assetsInv,assetsPct:pct(assetsCur,assetsInv),total:assetsCur};
}

// Alias para compatibilidad con código antiguo
function bucketSummary(b){
  if(!b)return emptyBucketSummary();
  // Si tiene sub (nueva estructura), calcular como plataforma
  if(b.subs!==undefined&&b.liquidity!==undefined)return platformSummary_fromObj(b);
  // Sub: solo assets
  const s=subSummary(b);
  return{...emptyBucketSummary(),...s,subs:{}};
}

// Calcula el resumen de un objeto plataforma (nueva estructura)
function platformSummary_fromObj(p){
  const liqEur=(p.liquidity?.eur||0)+usdToEur(p.liquidity?.usd||0);
  let assetsInv=0,assetsCur=0;
  const subs={};
  Object.entries(p.subs||{}).forEach(([sid,sub])=>{
    const s=subSummary(sub);
    subs[sid]=s;
    assetsInv+=s.assetsInv;assetsCur+=s.assetsCur;
  });
  let extrasVal=0;
  (p.extras||[]).forEach(e=>{extrasVal+=toEUR(e.unidades*(e.valorUnitario||0),e.moneda);});
  const assetsPnl=assetsCur-assetsInv;
  return{
    liqEur,liqEurOnly:p.liquidity?.eur||0,liqUsdOnly:p.liquidity?.usd||0,
    assetsInv,assetsCur,assetsPnl,assetsPct:pct(assetsCur,assetsInv),
    extrasVal,total:liqEur+assetsCur+extrasVal,subs,
  };
}

function platformSummary(platId){
  const p=S.platforms?S.platforms[platId]:null;
  if(!p)return emptyBucketSummary();
  return platformSummary_fromObj(p);
}

function capitalStats(){
  const movements=S.capitalMovements||[];
  const totalIn=movements.filter(m=>m.type==="in").reduce((s,m)=>s+m.amount,0);
  const totalOut=movements.filter(m=>m.type==="out").reduce((s,m)=>s+m.amount,0);
  return{totalIn,totalOut,netCapital:totalIn-totalOut};
}

const PRESET_COLORS=["#16a34a","#d97706","#3b82f6","#8b5cf6","#f97316","#06b6d4","#ec4899","#64748b","#dc2626","#0891b2"];
function randomColor(){return PRESET_COLORS[Math.floor(Math.random()*PRESET_COLORS.length)];}

function totals(){
  let liqEur=0,assetsInv=0,assetsCur=0,extrasVal=0;
  getPlats().forEach(plat=>{
    const s=platformSummary(plat.id);
    if(!s)return;
    liqEur+=s.liqEur;assetsInv+=s.assetsInv;assetsCur+=s.assetsCur;extrasVal+=s.extrasVal;
  });
  const cap=capitalStats();
  const totalAssets=liqEur+assetsCur+extrasVal;
  const realPnL=cap.netCapital>0?totalAssets-cap.netCapital:assetsCur-assetsInv+extrasVal;
  const realPct=pct(totalAssets,cap.netCapital>0?cap.netCapital:assetsInv);
  return{
    liqEur,assetsInv,assetsCur,extrasVal,
    assetsPnl:assetsCur-assetsInv,assetsPct:pct(assetsCur,assetsInv),
    cap,totalAssets,realPnL,realPct,
  };
}

// Activos: iteramos subs de cada plataforma
function allAssets(){
  const list=[];
  getPlats().forEach(plat=>{
    const p=S.platforms?S.platforms[plat.id]:null;
    if(!p)return;
    Object.entries(p.subs||{}).forEach(([sid,sub])=>{
      (sub.assets||[]).forEach(a=>list.push({...a,plat,subId:sid}));
    });
    // Compatibilidad: datos legacy planos
    if(!p.subs&&p.assets){
      (p.assets||[]).forEach(a=>list.push({...a,plat,subId:"spot"}));
    }
  });
  return list;
}
// Extras: nivel de plataforma (no de sub)
function allExtras(){
  const list=[];
  getPlats().forEach(plat=>{
    const p=S.platforms?S.platforms[plat.id]:null;
    if(!p)return;
    (p.extras||[]).forEach(e=>list.push({...e,plat}));

  return list;
}

// ── Gestión de plataformas (añadir, eliminar, activar subs opcionales) ──
function opAddPlatform(opts){
  // opts: {name, tipo?, base?, color?, emoji?}
  if(!opts.name||!opts.name.trim())return{ok:false,error:"Indica un nombre"};
  const id=generatePlatId(opts.name.trim());
  const usedColors=getPlats().map(p=>p.color);
  const usedEmojis=getPlats().map(p=>p.emoji);
  const color=opts.color||NEW_PLAT_COLORS.find(c=>!usedColors.includes(c))||NEW_PLAT_COLORS[0];
  const emoji=opts.emoji||NEW_PLAT_EMOJIS.find(e=>!usedEmojis.includes(e))||"💼";
  const newPlat={
    id,
    name:opts.name.trim(),
    tipo:opts.tipo||"Personalizada",
    emoji,
    base:opts.base||"USD",
    color,
    enabledSubs:[], // opcionales activadas
    custom:true,
  };
  if(!S.platsList)S.platsList=[...DEFAULT_PLATS];
  S.platsList.push(newPlat);
  // Crear bucket con subs estándar
  S.platforms[id]=emptyPlatform(id);
  return{ok:true,plat:newPlat};
}

function opRemovePlatform(platId){
  if(platTieneSaldo(platId))return{ok:false,error:"La plataforma tiene saldo (liquidez o activos). Traspasa los fondos antes de eliminarla."};
  if(!S.platsList)S.platsList=[...DEFAULT_PLATS];
  const idx=S.platsList.findIndex(p=>p.id===platId);
  if(idx<0)return{ok:false,error:"Plataforma no encontrada"};
  S.platsList.splice(idx,1);
  delete S.platforms[platId];
  return{ok:true};
}

function opToggleSubAccount(platId,subId){
  if(!S.platsList)S.platsList=[...DEFAULT_PLATS];
  const plat=S.platsList.find(p=>p.id===platId);
  if(!plat)return{ok:false};
  if(!plat.enabledSubs)plat.enabledSubs=[];
  const isStandard=STANDARD_SUBS.find(s=>s.id===subId);
  if(isStandard)return{ok:false,error:"Las subcuentas estándar (Spot/Futuros/Extras) no se pueden desactivar"};

  const platBucket=S.platforms[platId];
  if(plat.enabledSubs.includes(subId)){
    // Desactivar — solo si está vacía
    const sub=platBucket?.subs?.[subId];
    if(sub){
      const liq=(sub.liquidity?.eur||0)+(sub.liquidity?.usd||0);
      if(liq>0.01||(sub.assets||[]).length>0||(sub.extras||[]).length>0){
        return{ok:false,error:"La subcuenta tiene saldo. Vacíala antes de desactivarla."};
      }
      delete platBucket.subs[subId];
    }
    plat.enabledSubs=plat.enabledSubs.filter(s=>s!==subId);
  }else{
    // Activar
    plat.enabledSubs.push(subId);
    if(platBucket?.subs)platBucket.subs[subId]=emptyBucket();
  }
  return{ok:true,activado:plat.enabledSubs.includes(subId)};
}

// Ingresar liquidez — SIEMPRE a nivel de plataforma (subId ignorado)
function opIngresarLiquidez(platId,subId,monedaPago,cantidad,concepto){
  const p=getBucket(S,platId,null); // nivel plataforma
  if(!p)return false;
  if(!p.liquidity)p.liquidity={eur:0,usd:0};
  if(monedaPago==="EUR")p.liquidity.eur+=cantidad;
  else p.liquidity.usd+=cantidad;
  return true;
}

// Retirar liquidez — SIEMPRE de nivel de plataforma
function opRetirarLiquidez(platId,subId,monedaPago,cantidad){
  const p=getBucket(S,platId,null); // nivel plataforma
  if(!p)return{ok:false,error:"Plataforma no encontrada"};
  if(!p.liquidity)p.liquidity={eur:0,usd:0};
  const disponible=monedaPago==="EUR"?(p.liquidity.eur||0):(p.liquidity.usd||0);
  if(cantidad>disponible+1e-9)return{ok:false,error:`No hay tanta liquidez. Disponible: ${fmt(disponible,monedaPago)}`};
  if(monedaPago==="EUR")p.liquidity.eur-=cantidad;
  else p.liquidity.usd-=cantidad;
  return{ok:true};
}

// Comprar activo: resta de liquidez de PLATAFORMA, suma a activos de la SUB
function opComprar(platId,subId,opts){
  const plat=S.platforms?S.platforms[platId]:null;
  if(!plat)return{ok:false,error:"Plataforma no encontrada"};
  if(!plat.liquidity)plat.liquidity={eur:0,usd:0};
  const{simbolo,nombre,unidades,precio,monedaPago,fecha}=opts;
  const coste=unidades*precio;
  const disp=monedaPago==="EUR"?(plat.liquidity.eur||0):(plat.liquidity.usd||0);
  if(coste>disp+1e-6)return{ok:false,error:`Liquidez insuficiente. Necesitas ${fmt(coste,monedaPago)} y tienes ${fmt(disp,monedaPago)}`};

  // Restar de liquidez de la plataforma
  if(monedaPago==="EUR")plat.liquidity.eur-=coste;
  else plat.liquidity.usd-=coste;

  // Añadir a activos de la sub
  const realSubId=subId||"spot";
  if(!plat.subs)plat.subs={};
  if(!plat.subs[realSubId])plat.subs[realSubId]={assets:[]};
  const sub=plat.subs[realSubId];
  if(!sub.assets)sub.assets=[];

  const existing=sub.assets.find(a=>a.simbolo.toUpperCase()===simbolo.toUpperCase()&&a.moneda===monedaPago);
  if(existing){
    const totalUnits=existing.unidades+unidades;
    const totalCost=existing.unidades*existing.precioMedio+coste;
    existing.unidades=totalUnits;
    existing.precioMedio=totalCost/totalUnits;
    existing.precioActual=precio;
    existing.fecha=fecha||today();
  }else{
    sub.assets.push({
      id:uid(),simbolo:simbolo.toUpperCase(),nombre:nombre||simbolo,
      unidades,precioMedio:precio,precioActual:precio,
      moneda:monedaPago,fecha:fecha||today()
    });
  }
  return{ok:true,coste};
}

// Vender activo: quita de sub, suma a liquidez de PLATAFORMA
function opVender(platId,subId,assetId,opts){
  const b=getBucket(S,platId,subId||"spot");
  if(!b)return{ok:false,error:"Subcuenta no encontrada"};
  const asset=(b.assets||[]).find(a=>a.id===assetId);
  if(!asset)return{ok:false,error:"Activo no encontrado"};
  const{unidadesVender,precioVenta,monedaCobro,fecha}=opts;
  if(unidadesVender>asset.unidades+1e-9)return{ok:false,error:`Solo tienes ${fN(asset.unidades,6)} unidades`};

  // Calcular importe recibido (en moneda de cobro)
  // Si moneda del asset es distinta, se asume conversión a la del cobro
  let importe=unidadesVender*precioVenta; // en monedaCobro

  // Sumar a liquidez DE LA PLATAFORMA (no de la sub)
  const plat4v=S.platforms?S.platforms[platId]:null;
  if(plat4v){
    if(!plat4v.liquidity)plat4v.liquidity={eur:0,usd:0};
    if(monedaCobro==="EUR")plat4v.liquidity.eur+=importe;
    else plat4v.liquidity.usd+=importe;
  }

  // Registrar venta para Hacienda (en EUR)
  const proceedsEur=toEUR(importe,monedaCobro);
  const costEur=toEUR(unidadesVender*asset.precioMedio,asset.moneda);
  S.realizedSales.push({
    id:uid(),
    date:fecha||today(),
    platId,subId,
    assetName:asset.nombre,symbol:asset.simbolo,
    unitsSold:unidadesVender,
    priceSold:precioVenta,
    avgPriceAtSale:asset.precioMedio,
    totalReceived:importe,
    moneda:monedaCobro,
    moneda_compra:asset.moneda,
    proceedsEur,costEur,gainEur:proceedsEur-costEur,
  });

  // Actualizar/eliminar asset en la sub
  asset.unidades-=unidadesVender;
  if(asset.unidades<1e-9){
    b.assets=b.assets.filter(a=>a.id!==assetId);
  }
  return{ok:true,importe};
}

// Añadir extra a nivel de PLATAFORMA (subId ignorado)
function opAddExtra(platId,subId,opts){
  const plat=S.platforms?S.platforms[platId]:null;
  if(!plat)return{ok:false,error:"Plataforma no encontrada"};
  if(!plat.extras)plat.extras=[];
  plat.extras.push({
    id:uid(),
    simbolo:(opts.simbolo||"EUR").toUpperCase(),
    nombre:opts.nombre||opts.simbolo||"Rendimiento",
    unidades:opts.unidades||1,
    valorUnitario:opts.valorUnitario,
    moneda:opts.moneda||"EUR",
    tipo:opts.tipo||"otro",
    fecha:opts.fecha||today()
  });
  return{ok:true};
}

// Cobrar extra: busca en plataforma, suma a liquidez de plataforma
function opCobrarExtra(platId,subId,extraId,monedaCobro){
  const plat=S.platforms?S.platforms[platId]:null;
  if(!plat)return{ok:false};
  if(!plat.extras)plat.extras=[];
  const extra=plat.extras.find(e=>e.id===extraId);
  if(!extra)return{ok:false};
  const valor=extra.unidades*extra.valorUnitario;
  let montoFinal=valor;
  if(extra.moneda!==monedaCobro){
    montoFinal=monedaCobro==="EUR"?toEUR(valor,extra.moneda):toUSD(valor,extra.moneda);
  }
  if(!plat.liquidity)plat.liquidity={eur:0,usd:0};
  if(monedaCobro==="EUR")plat.liquidity.eur+=montoFinal;
  else plat.liquidity.usd+=montoFinal;
  plat.extras=plat.extras.filter(e=>e.id!==extraId);
  return{ok:true,monto:montoFinal};
}

function opDelAsset(platId,subId,assetId){
  const b=getBucket(S,platId,subId||"spot");
  if(!b)return false;
  b.assets=(b.assets||[]).filter(a=>a.id!==assetId);

}
function opDelExtra(platId,subId,extraId){
  const plat=S.platforms?S.platforms[platId]:null;
  if(!plat)return false;
  plat.extras=(plat.extras||[]).filter(e=>e.id!==extraId);

function opUpdatePrice(platId,subId,assetId,newPrice){
  const b=getBucket(S,platId,subId||"spot");
  if(!b)return false;

function opUpdateExtraValue(platId,subId,extraId,newValue){

  const e=(plat.extras||[]).find(x=>x.id===extraId);
  if(!e)return false;
  e.valorUnitario=newValue;
  return true;
}

function showToast(msg,type="ok"){
  const t=document.getElementById("toast");
  if(!t)return;
  t.textContent=msg;
  t.className="toast show";
  if(msg.startsWith("✅")||msg.startsWith("¡"))t.style.background="#16a34a";
  else if(msg.startsWith("⚠️"))t.style.background="#d97706";
  else if(msg.startsWith("❌"))t.style.background="#dc2626";
  else if(msg.startsWith("⏳"))t.style.background="#1d4ed8";
  else t.style.background="#1f2937";
  clearTimeout(t._t);
  t._t=setTimeout(()=>{t.classList.remove("show");},3000);
}


//================================================================
// CHART — barras mensuales desde snapshots reales
//================================================================
function buildChart(){
  // Agrupar snapshots por mes — coger el último de cada mes
  const snaps=(S.portfolioSnapshots||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const byMonth={};
  for(const s of snaps){const key=s.date.slice(0,7);byMonth[key]=s;}
  const mesesKeys=Object.keys(byMonth).sort();
  const usarEjemplo=mesesKeys.length<2;

  const datos=usarEjemplo
    ?[{mes:"Ene",val:conv(5000)},{mes:"Feb",val:conv(14750)},{mes:"Mar",val:conv(24600)},{mes:"Abr",val:conv(21357)},{mes:"Hoy",val:conv(21500)}]
    :mesesKeys.map(k=>{
        const s=byMonth[k];
        const [y,m]=k.split("-");
        const nombre=new Date(+y,+m-1,1).toLocaleDateString("es-ES",{month:"short"})+"'"+y.slice(2);
        return{mes:nombre,val:conv(s.value)};
      });

  const W=760,H=180,pl=52,pr=10,pt=30,pb=28,iW=W-pl-pr,iH=H-pt-pb;
  const n=datos.length;
  if(!n)return`<div style="height:180px;display:flex;align-items:center;justify-content:center;color:var(--subtle);font-size:13px">Abre la app cada mes para ir generando el historial automaticamente</div>`;

  const vals=datos.map(d=>d.val);
  const mx=Math.max(...vals);
  const mn=Math.min(0,...vals.map(v=>v*0.85));
  const gap=iW/n,barW=Math.min(gap*0.65,60);
  const ys=v=>pt+iH-(v-mn)/(mx-mn||1)*iH;
  const xc=i=>pl+gap*i+gap/2;

  const grid=[0.25,0.5,0.75,1].map(f=>{
    const yv=mn+(mx-mn)*f,yp=ys(yv);
    const lbl=S.moneda==="EUR"?`${(yv/1000).toFixed(0)}k€`:`$${(yv/1000).toFixed(0)}k`;
    return`<line x1="${pl}" y1="${yp.toFixed(1)}" x2="${pl+iW}" y2="${yp.toFixed(1)}" stroke="#ebebE3" stroke-width="1"/>
      <text x="${pl-6}" y="${(yp+4).toFixed(1)}" text-anchor="end" fill="#94a3b8" font-size="9" font-family="Roboto Mono">${lbl}</text>`;
  }).join("");

  const bars=datos.map((d,i)=>{
    const prev=i>0?datos[i-1].val:d.val;
    const sube=d.val>=prev;
    const color=sube?"#16a34a":"#dc2626";
    const yTop=ys(d.val),yBase=ys(mn),bH=Math.max(2,yBase-yTop);
    const cx=xc(i);
    const lbl=d.val>=1000?(S.moneda==="EUR"?`${(d.val/1000).toFixed(1)}k€`:`$${(d.val/1000).toFixed(1)}k`):(S.moneda==="EUR"?`${Math.round(d.val)}€`:`$${Math.round(d.val)}`);
    const diffPct=i>0&&prev>0?((d.val-prev)/prev*100):0;
    const diffTxt=i>0?(sube?`▲${fN(Math.abs(diffPct),1)}%`:`▼${fN(Math.abs(diffPct),1)}%`):"";
    return`<rect x="${(cx-barW/2).toFixed(1)}" y="${yTop.toFixed(1)}" width="${barW.toFixed(1)}" height="${bH.toFixed(1)}" fill="${color}" rx="4" opacity=".85"/>
      <text x="${cx.toFixed(1)}" y="${(yTop-6).toFixed(1)}" text-anchor="middle" fill="${color}" font-size="9" font-weight="700" font-family="Roboto Mono">${lbl}</text>
      ${diffTxt?`<text x="${cx.toFixed(1)}" y="${(yTop-16).toFixed(1)}" text-anchor="middle" fill="${color}" font-size="8" font-family="Roboto Mono">${diffTxt}</text>`:""}
      <text x="${cx.toFixed(1)}" y="${(H-6).toFixed(1)}" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Roboto Mono">${d.mes}</text>`;
  }).join("");

  const aviso=usarEjemplo?`<text x="${W/2}" y="14" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Roboto Mono" font-style="italic">datos de ejemplo — el grafico real se construye automaticamente cada mes</text>`:"";

  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H+10}px;overflow:visible">
    ${aviso}${grid}${bars}
  </svg>`;
}
function buildPie(items){
  const total=items.reduce((s,d)=>s+d.v,0);
  if(!total)return`<div style="height:110px;display:flex;align-items:center;justify-content:center;color:var(--subtle);font-size:12px">Sin datos</div>`;
  const cx=55,cy=55,r=48,ri=28;let a=-Math.PI/2;
  return`<svg width="110" height="110" viewBox="0 0 110 110">${items.map(d=>{
    const da=(d.v/total)*Math.PI*2;
    const x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a);
    const x2=cx+r*Math.cos(a+da),y2=cy+r*Math.sin(a+da);
    const xi1=cx+ri*Math.cos(a),yi1=cy+ri*Math.sin(a);
    const xi2=cx+ri*Math.cos(a+da),yi2=cy+ri*Math.sin(a+da);
    const lg=da>Math.PI?1:0;
    const path=`M${xi1.toFixed(1)},${yi1.toFixed(1)} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${ri},${ri} 0 ${lg},0 ${xi1.toFixed(1)},${yi1.toFixed(1)} Z`;
    a+=da;return`<path d="${path}" fill="${d.color}" opacity=".88"/>`;
  }).join("")}</svg>`;
}

      <button onclick='openEditPlatModal(${opPlatArgs})' class="btn-sm">✏️</button>
      <button onclick='deletePlat(${opPlatArgs})' class="btn-plat-del">🗑</button>
    </div>`:""}
  </div>`;

  // ── CAJÓN 1: LIQUIDEZ (nivel de plataforma) ──────────────────
  const liq=platData.liquidity||{eur:0,usd:0};
  const liqEurEquiv=eurToUsd(liq.eur||0);
  const liqUsdEquiv=usdToEur(liq.usd||0);
  const liquidezBlock=`<div class="cajon" style="background:#f0fdf480">
    <div class="cajon-head" style="background:#f0fdf4;border-bottom:1px solid var(--gborder)">
      <div class="cajon-title" style="color:#166534"><span class="ico">💰</span><div><div>Liquidez</div><div class="lbl" style="color:#4ade80aa">Efectivo disponible · ${fC(sum.liqEur)}</div></div></div>
    </div>
    <div class="cajon-body">
      <div class="liq-grid">
        <div class="liq-cell">
          <div class="liq-cell-lbl">€ Euros</div>
          <div class="liq-cell-val n">${fmt(liq.eur||0,"EUR")}</div>
          ${(liq.eur||0)>0?`<div class="liq-cell-sub">≈ ${fmt(liqEurEquiv,"USD")}</div>`:""}
        </div>
        <div class="liq-cell">
          <div class="liq-cell-lbl">$ USD / Stablecoins</div>
          <div class="liq-cell-val n">${fmt(liq.usd||0,"USD")}</div>
          ${(liq.usd||0)>0?`<div class="liq-cell-sub">≈ ${fmt(liqUsdEquiv,"EUR")}</div>`:""}
        </div>
      </div>
    </div>
  </div>`;

  // ── CAJÓN 2: EXTRAS (nivel de plataforma) ────────────────────
  const extras=platData.extras||[];
  const extrasBlock=`<div class="cajon" style="background:#f5f3ff20">
    <div class="cajon-head" style="background:#f5f3ff;border-bottom:1px solid var(--pborder)">
      <div class="cajon-title" style="color:#6d28d9"><span class="ico">🎁</span><div><div>Extras</div><div class="lbl" style="color:#a78bfa88">Rendimientos gratuitos · ${sum.extrasVal>0?fC(sum.extrasVal):"0€"}</div></div></div>
      ${!isGlobal?`<div class="cajon-actions">
        <button class="btn-extra" onclick='openExtraModal(${opPlatArgs},null)'>+ Añadir extra</button>
      </div>`:""}
    </div>
    <div class="cajon-body table-mobile-cards">
      ${extras.length===0
        ?`<div style="padding:12px 18px;text-align:center;color:var(--subtle);font-size:12px">Sin extras — staking, cashback, dividendos...</div>`
        :`<div class="th tr-mobile-hide" style="grid-template-columns:1.8fr 1fr 1fr auto"><span>Concepto</span><span style="text-align:right">Valor</span><span style="text-align:right">Moneda</span><span></span></div>
        ${extras.map(e=>{
          const total=e.unidades*(e.valorUnitario||0);
          const desktopRow=`<div class="tr tr-mobile-hide" style="grid-template-columns:1.8fr 1fr 1fr auto;align-items:center">
            <div><div style="font-size:13px;font-weight:600">${e.nombre}${e._owner?` <span style="font-size:9px;color:var(--subtle)">(${e._owner})</span>`:""}</div><div style="font-size:10px;color:var(--subtle)">${e.fecha||"—"}</div></div>
            <div class="n" style="font-size:13px;font-weight:700;text-align:right;color:var(--purple)">${fmt(total,e.moneda)}</div>
            <div class="n" style="font-size:11px;color:var(--muted);text-align:right">${e.moneda}</div>
            <div style="display:flex;gap:4px;align-items:center">
              ${!isGlobal?`<button class="btn-sm" onclick='openExtraModal(${opPlatArgs},null,${JSON.stringify(e.id)})' style="font-size:10px;padding:3px 7px">✏️</button>`:""}
              ${!isGlobal?`<button class="btn-sm" onclick='openCobrarExtraModal(${opPlatArgs},null,${JSON.stringify(e.id)})' style="font-size:10px;padding:3px 7px;color:var(--green)">💸</button>`:""}
              ${!isGlobal?`<button class="del" data-act="del-extra" data-pid="${plat.id}" data-sub="" data-eid="${e.id}">✕</button>`:""}
            </div>
          </div>`;
          const mobileCard=`<div class="mcard">
            <div class="mcard-row">
              <div><div class="mcard-name">${e.nombre}</div><div class="mcard-sub">${e.fecha||"—"} · ${e.moneda}</div></div>
              <div class="mcard-val" style="color:var(--purple)">${fmt(total,e.moneda)}</div>
            </div>
            ${!isGlobal?`<div class="mcard-actions">
              <button class="btn-sm" onclick='openExtraModal(${opPlatArgs},null,${JSON.stringify(e.id)})'>✏️ Editar</button>
              <button class="btn-sm" onclick='openCobrarExtraModal(${opPlatArgs},null,${JSON.stringify(e.id)})' style="color:var(--green)">💸 Cobrar</button>
              <button class="btn-plat-del" data-act="del-extra" data-pid="${plat.id}" data-sub="" data-eid="${e.id}">✕</button>
            </div>`:""}
          </div>`;
          return desktopRow+mobileCard;
        }).join("")}`}
    </div>
  </div>`;

  // ── CAJONES DE ACTIVOS — una sección por subcuenta ───────────
  const platSubs=getSubsFor(plat.id);
  const activosSubs=platSubs.map(sub=>{
    const subData=platData.subs?.[sub.id]||{assets:[]};
    const subSumObj=sum.subs?.[sub.id]||{assetsInv:0,assetsCur:0,assetsPnl:0,assetsPct:0};
    const opArgs=`${JSON.stringify(plat.id)},${JSON.stringify(sub.id)}`;
    const assets=subData.assets||[];
    const subTotal=subSumObj.assetsCur||0;

    const assetsRows=assets.length===0
      ?`<div style="padding:14px 18px;text-align:center;color:var(--subtle);font-size:12px">Sin activos${!isGlobal?` · <button class="btn-buy" onclick='openComprarModal(${opArgs})' style="margin-left:6px">+ Comprar</button>`:""}</div>`
      :`<div class="th tr-mobile-hide" style="grid-template-columns:1.6fr 1fr 1.2fr 1fr auto">
          <span>Activo · Ticker</span><span style="text-align:right">Invertido · Valor</span>
          <span style="text-align:center">P.Compra → P.Actual</span>
          <span style="text-align:right">Ganancia / Pérdida</span><span></span>
        </div>
      ${assets.map(a=>{
        const inv=a.unidades*a.precioMedio;
        const cur=a.unidades*a.precioActual;
        const gain=cur-inv,gp=pct(cur,inv);
        const arrColor=a.precioActual>a.precioMedio?"var(--green)":a.precioActual<a.precioMedio?"var(--red)":"var(--muted)";
        const arrSymbol=a.precioActual>a.precioMedio?"↗":"↘";
        const desktopRow=`<div class="tr tr-mobile-hide" style="grid-template-columns:1.6fr 1fr 1.2fr 1fr auto;align-items:center">
          <div>
            <div style="font-size:13px;font-weight:700">${a.nombre}${a._owner?` <span style="font-size:9px;color:var(--subtle)">(${a._owner})</span>`:""}</div>
            <div style="font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.5px">${a.simbolo}</div>
          </div>
          <div style="text-align:right">
            <div class="n" style="font-size:10px;color:var(--subtle)">Inv: ${fmt(inv,a.moneda)}</div>
            <div class="n" style="font-size:13px;font-weight:700;color:var(--blue)">${fmt(cur,a.moneda)}</div>
          </div>
          <div style="display:flex;align-items:center;justify-content:center;gap:5px">
            <div style="text-align:right">
              <div style="font-size:9px;color:var(--subtle);margin-bottom:1px">COMPRA</div>
              <div class="n" style="font-size:11px;color:var(--muted)">${fmt(a.precioMedio,a.moneda)}</div>
            </div>
            <div style="font-size:16px;font-weight:700;color:${arrColor}">${arrSymbol}</div>
            <div>
              <div style="font-size:9px;color:var(--subtle);margin-bottom:1px">ACTUAL</div>
              ${!isGlobal?`<div class="pinp-wrap">
                <input class="pinp" type="text" inputmode="decimal" value="${fN(a.precioActual,2)}" data-upd-price data-pid="${plat.id}" data-sub="${sub.id}" data-aid="${a.id}"/>
                <button class="pinp-ok" data-confirm-price data-pid="${plat.id}" data-sub="${sub.id}" data-aid="${a.id}">✓</button>
              </div>`:`<div class="n" style="font-size:11px;font-weight:700;color:var(--blue)">${fmt(a.precioActual,a.moneda)}</div>`}
            </div>
          </div>
          <div style="text-align:right">
            <div class="n ${pcl(gain)}" style="font-size:13px;font-weight:800">${gain>=0?"+":""}${fmt(gain,a.moneda)}</div>
            <div class="n ${pcl(gain)}" style="font-size:11px;font-weight:700">${gain>=0?"+":""}${fN(gp)}%</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:3px;align-items:flex-end">
            ${!isGlobal?`<button class="btn-sell" onclick='openVenderModal(${opArgs},${JSON.stringify(a.id)})'>💰 Vender</button>`:""}
            ${!isGlobal?`<button class="btn-sm" onclick='openEditAssetModal(${JSON.stringify(plat.id)},${JSON.stringify(sub.id)},${JSON.stringify(a.id)})' style="font-size:10px">✏️</button>`:""}
            ${!isGlobal?`<button class="del" data-act="del-asset" data-pid="${plat.id}" data-sub="${sub.id}" data-aid="${a.id}">✕</button>`:""}
          </div>
        </div>`;
        const mobileCard=`<div class="mcard">
          <div class="mcard-row">
            <div>
              <div class="mcard-name">${a.nombre}${a._owner?` <span style="font-size:10px;color:var(--subtle)">(${a._owner})</span>`:""}</div>
              <div class="mcard-sub" style="color:var(--blue)">${a.simbolo} · ${fN(a.unidades,4)} uds</div>
            </div>
            <div style="text-align:right">
              <div class="mcard-val" style="color:var(--blue)">${fmt(cur,a.moneda)}</div>
              <div class="n ${pcl(gain)}" style="font-size:12px;font-weight:700">${gain>=0?"+":""}${fmt(gain,a.moneda)} · ${gain>=0?"+":""}${fN(gp)}%</div>
            </div>
          </div>
          <div class="mcard-row bord">
            <div><div class="mcard-sub">P.Compra → Actual</div>
              <div><span class="n" style="color:var(--muted)">${fmt(a.precioMedio,a.moneda)}</span> <span style="color:${arrColor};font-weight:700">${arrSymbol}</span> <span class="n" style="color:var(--blue)">${fmt(a.precioActual,a.moneda)}</span></div>
            </div>
            ${!isGlobal?`<div class="pinp-wrap">
              <input class="pinp" type="text" inputmode="decimal" value="${fN(a.precioActual,2)}" data-upd-price data-pid="${plat.id}" data-sub="${sub.id}" data-aid="${a.id}"/>
              <button class="pinp-ok" data-confirm-price data-pid="${plat.id}" data-sub="${sub.id}" data-aid="${a.id}">✓</button>
            </div>`:""}
          </div>
          ${!isGlobal?`<div class="mcard-actions">
            <button class="btn-sell" onclick='openVenderModal(${opArgs},${JSON.stringify(a.id)})'>💰 Vender</button>
            <button class="btn-sm" onclick='openEditAssetModal(${JSON.stringify(plat.id)},${JSON.stringify(sub.id)},${JSON.stringify(a.id)})'>✏️</button>
            <button class="btn-plat-del" data-act="del-asset" data-pid="${plat.id}" data-sub="${sub.id}" data-aid="${a.id}">✕</button>
          </div>`:""}
        </div>`;
        return desktopRow+mobileCard;
      }).join("")}`;

    return`<div class="cajon">
      <div class="cajon-head" style="background:#eff6ff;border-bottom:1px solid var(--bborder)">
        <div class="cajon-title" style="color:#1d4ed8"><span class="ico">${sub.emoji}</span><div><div>${sub.name}</div><div class="lbl" style="color:#93c5fdaa">Activos · ${subTotal>0?fC(subTotal):"vacío"}</div></div></div>
        ${!isGlobal?`<div class="cajon-actions">
          <button class="btn-buy" onclick='openComprarModal(${opArgs})'>+ Comprar</button>
        </div>`:""}
      </div>
      <div class="cajon-body table-mobile-cards">${assetsRows}</div>
    </div>`;
  }).join("");

  return`<div class="card pb" style="border-left:4px solid ${plat.color}">
    ${head}
    ${liquidezBlock}
    ${activosSubs}
    ${extrasBlock}
  </div>`;
}

// ── ACTIVOS GLOBALES (lista plana) ────────────────────────────────
function buildActivos(){
  const all=allAssets();
  if(!all.length)return`${tip("📋","Lista plana de todos tus activos en todas las plataformas, ordenados por valor.")}<div class="card" style="padding:44px;text-align:center;color:var(--muted)">Sin activos · ve a <span style="color:var(--blue);cursor:pointer;font-weight:700" data-act="goto-plat">Plataformas</span> y compra desde tu liquidez</div>`;
  const totCur=all.reduce((s,a)=>s+toEUR(a.unidades*a.precioActual,a.moneda),0);
  return`${tip("📋","Lista plana de todos tus activos. Útil para ver cuánto pesa cada uno en tu portfolio total.")}
  <div class="card table-mobile-cards" style="overflow-x:auto"><div style="min-width:680px">
    <div class="th tr-mobile-hide" style="grid-template-columns:1.8fr 1fr 1fr 1fr 1fr 90px"><span>Activo</span><span>Plataforma</span><span style="text-align:right">Invertido</span><span style="text-align:right">Valor</span><span style="text-align:right">Ganancia</span><span style="text-align:right">Peso</span></div>
    ${[...all].sort((a,b)=>(b.unidades*b.precioActual)-(a.unidades*a.precioActual)).map(a=>{
      const inv=toEUR(a.unidades*a.precioMedio,a.moneda);
      const cur=toEUR(a.unidades*a.precioActual,a.moneda);
      const gain=cur-inv,gp=pct(cur,inv);
      const w=totCur>0?cur/totCur*100:0;
      const subLabel=a.subId?` · ${findSubName(a.subId)}`:"";
      const desktopRow=`<div class="tr tr-mobile-hide" style="grid-template-columns:1.8fr 1fr 1fr 1fr 1fr 90px">
        <div><div style="font-size:13px;font-weight:700">${a.nombre}${a._owner?` <span style="font-size:9px;color:var(--subtle)">(${a._owner})</span>`:""}</div><div style="font-size:10px;color:var(--subtle)">${a.simbolo}</div></div>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:7px;height:7px;border-radius:2px;background:${a.plat.color}"></div><span style="font-size:11px;color:var(--muted);font-weight:500">${a.plat.name}${subLabel}</span></div>
        <div class="n" style="font-size:12px;text-align:right;color:var(--muted)">${fC(inv)}</div>
        <div class="n" style="font-size:13px;text-align:right;font-weight:700">${fC(cur)}</div>
        <div style="text-align:right"><div class="n ${pcl(gain)}" style="font-size:13px;font-weight:700">${ps(gain)}${fC(gain)}</div><div class="n ${pcl(gain)}" style="font-size:11px;font-weight:600">${ps(gp)}${fN(gp)}%</div></div>
        <div style="text-align:right"><div class="n" style="font-size:12px;font-weight:700">${fN(w,1)}%</div><div class="prog-wrap"><div class="prog" style="width:${Math.min(w,100).toFixed(1)}%;background:${a.plat.color}"></div></div></div>
      </div>`;
      const mobileCard=`<div class="mcard">
        <div class="mcard-row">
          <div>
            <div class="mcard-name">${a.nombre}${a._owner?` <span style="font-size:10px;color:var(--subtle)">(${a._owner})</span>`:""}</div>
            <div class="mcard-sub" style="display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:2px;background:${a.plat.color}"></div>${a.simbolo} · ${a.plat.name}${subLabel}</div>
          </div>
          <div style="text-align:right">
            <div class="mcard-val" style="font-size:16px">${fC(cur)}</div>
            <div class="n ${pcl(gain)}" style="font-size:11px;font-weight:600">${ps(gp)}${fN(gp)}%</div>
          </div>
        </div>
        <div class="mcard-row bord">
          <div><div class="mcard-sub">Invertido</div><div class="n" style="font-size:13px;color:var(--muted)">${fC(inv)}</div></div>
          <div style="text-align:right"><div class="mcard-sub">Ganancia</div><div class="n ${pcl(gain)}" style="font-size:13px;font-weight:700">${ps(gain)}${fC(gain)}</div></div>
          <div style="text-align:right"><div class="mcard-sub">Peso</div><div class="n" style="font-size:13px;font-weight:700">${fN(w,1)}%</div></div>
        </div>
      </div>`;
      return desktopRow+mobileCard;
    }).join("")}
  </div></div>`;
}


// ── CAPITAL ────────────────────────────────────────────────────────
function buildCapital(){
  const movs=S.capitalMovements||[];
  const cap=capitalStats();
  const IS=`background:#fff;border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--text);font-family:'Roboto Mono',monospace;width:100%`;

  const addForm=ACTIVE_PROFILE==="global"
    ?`<div class="notice n-warn" style="margin-bottom:16px">👁 Modo Global solo lectura. Cambia a <b>Jorge</b> o <b>Raquel</b> para añadir.</div>`
    :`<div class="cap-form">
      <div style="font-size:9px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--subtle);margin-bottom:14px">Registrar movimiento de capital</div>
      <div class="fi-row">
        <div class="fg" style="flex:0 0 110px"><label class="fl">Fecha *</label><input type="date" value="${S.capForm.date||today()}" data-cf="date" style="${IS}"/></div>
        <div class="fg" style="flex:0 0 120px"><label class="fl">Tipo *</label><select data-cf="type" style="${IS}"><option value="in"${S.capForm.type==="in"?" selected":""}>💰 Aportación</option><option value="out"${S.capForm.type==="out"?" selected":""}>💸 Retirada</option></select></div>
        <div class="fg" style="flex:1;min-width:100px"><label class="fl">Cantidad (€) *</label><input type="text" inputmode="decimal" placeholder="5000" value="${S.capForm.amount||""}" data-cf="amount" style="${IS}"/></div>
      </div>
      <div class="fi-row">
        <div class="fg" style="flex:1"><label class="fl">Concepto *</label><input type="text" placeholder="ej: Transferencia enero" value="${S.capForm.concept||""}" data-cf="concept" style="${IS}"/></div>
        <div class="fg" style="flex:0 0 160px"><label class="fl">Plataforma destino</label><select data-cf="platform" style="${IS}"><option value="general"${S.capForm.platform==="general"?" selected":""}>🌐 General</option>${getPlats().map(p=>`<option value="${p.id}"${S.capForm.platform===p.id?" selected":""}>${p.emoji} ${p.name}</option>`).join("")}</select></div>
      </div>
      <button class="btn btn-green" data-act="add-capital" style="width:100%;padding:11px">${S.capForm.type==="in"?"💰 Registrar aportación":"💸 Registrar retirada"}</button>
      ${S.capMsg?`<div class="notice n-ok" style="margin-top:10px">✅ ${S.capMsg}</div>`:""}
    </div>`;

  return`${tip("💰","Registra el dinero real que metes y sacas. Esto sirve para calcular tu <b>ganancia REAL</b> total. Tip: cuando ingresas liquidez en una plataforma, la app puede registrarlo automáticamente como aportación.")}
  <div style="max-width:700px">
    <div class="stats" style="margin-bottom:16px">
      ${sc("Total aportado",fC(cap.totalIn),ACTIVE_PROFILE==="global"?"Jorge + Raquel":"Dinero metido","var(--text)")}
      ${sc("Total retirado",cap.totalOut>0?fC(cap.totalOut):"—","Dinero sacado","var(--red)")}
      ${sc("Capital neto",fC(cap.netCapital),"Aportado − Retirado","var(--blue)")}
    </div>
    ${addForm}
    <div class="card table-mobile-cards" style="overflow:hidden">
      <div style="padding:12px 18px;background:#fafaf8;border-bottom:1px solid var(--border);font-size:9px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--subtle)">Historial${ACTIVE_PROFILE==="global"?" — Jorge + Raquel":""}</div>
      ${movs.length===0?`<div style="padding:36px;text-align:center;color:var(--subtle);font-size:13px">Sin movimientos.</div>`:`<div style="overflow-x:auto"><div style="min-width:580px" class="table-mobile-cards">
        <div class="tr-mobile-hide" style="display:grid;grid-template-columns:90px 90px 1fr 130px 90px auto;gap:8px;padding:8px 18px;font-size:9px;font-weight:700;color:var(--subtle);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:1px"><span>Fecha</span><span>Tipo</span><span>Concepto</span><span>Plataforma</span><span style="text-align:right">Cantidad</span><span></span></div>
        ${[...movs].reverse().map(m=>{
          const plat=m.platform&&m.platform!=="general"?platBy(m.platform):null;
          const op=m._owner?PROFILES.find(p=>p.name===m._owner):null;
          const desktopRow=`<div class="tr-mobile-hide" style="display:grid;grid-template-columns:90px 90px 1fr 130px 90px auto;gap:8px;padding:11px 18px;border-bottom:1px solid #f2f2ea;align-items:center">
            <div class="n" style="font-size:11px;color:var(--muted)">${m.date||"—"}</div>
            <div style="display:flex;flex-direction:column;gap:3px"><span class="${m.type==="in"?"cap-type-in":"cap-type-out"}">${m.type==="in"?"💰":"💸"} ${m.type==="in"?"Entrada":"Salida"}</span>${op?`<span style="font-size:9px;font-weight:700;color:${op.color}">${op.emoji} ${op.name}</span>`:""}</div>
            <div style="font-size:13px;font-weight:600">${m.concept}</div>
            <div style="font-size:11px;color:var(--muted)">${plat?`${plat.emoji} ${plat.name}`:"🌐 General"}</div>
            <div class="n ${m.type==="in"?"pos":"neg"}" style="font-size:13px;font-weight:700;text-align:right">${m.type==="in"?"+":"−"}${fC(m.amount)}</div>
            ${ACTIVE_PROFILE==="global"?`<span></span>`:`<button class="del" data-act="del-capital" data-id="${m.id}">✕</button>`}
          </div>`;
          const mobileCard=`<div class="mcard">
            <div class="mcard-row">
              <div>

function getRealizedGains(year){
  // Ahora viene 100% de realizedSales (ya no de transactions)
  const yearStart=new Date(year+"-01-01"),yearEnd=new Date((year+1)+"-01-01");
  let stocksGain=0,cryptoGain=0;
  const stockPlats=["tr"];
  (S.realizedSales||[]).forEach(s=>{
    if(!s.date)return;
    const d=new Date(s.date);
    if(d<yearStart||d>=yearEnd)return;
    const gainEur=s.gainEur??(toEUR(s.unitsSold*s.priceSold,s.moneda)-toEUR(s.unitsSold*s.avgPriceAtSale,s.moneda_compra||s.moneda));
    if(stockPlats.includes(s.platId))stocksGain+=gainEur;
    else cryptoGain+=gainEur;
  });
  return{stocksGain,cryptoGain};
}
function calcIRPF(gain){
  if(gain<=0)return{tax:0,brackets:[]};
  // Base del ahorro España 2025+: 5 tramos
  const brackets=[
    {limit:6000,rate:0.19},
    {limit:50000,rate:0.21},
    {limit:200000,rate:0.23},
    {limit:300000,rate:0.27},
    {limit:Infinity,rate:0.28}
  ];
  let tax=0,prev=0;
  for(const b of brackets){
    if(gain>prev){
      const slice=Math.min(gain,b.limit)-prev;
      tax+=slice*b.rate;
      if(gain<=b.limit)break;
      prev=b.limit;
    }
  }
  return{tax};
}
function buildHacienda(){
  const year=new Date().getFullYear();
  const isGlobal=ACTIVE_PROFILE==="global";
  const sales=(S.realizedSales||[]).filter(s=>(s.date||"").startsWith(year));
  const salesAll=S.realizedSales||[];
  let gananciaReal=0,perdidaReal=0;
  sales.forEach(s=>{
    const g=s.gainEur??toEUR(s.unitsSold*s.priceSold,s.moneda)-toEUR(s.unitsSold*(s.avgPriceAtSale||0),s.moneda);
    if(g>=0)gananciaReal+=g; else perdidaReal+=g;
  });
  const resultadoNeto=gananciaReal+perdidaReal;
  const irpf=calcIRPF(Math.max(0,resultadoNeto));
  const openAssets=allAssets();
  let gananciaLatente=0,perdidaLatente=0;
  openAssets.forEach(a=>{
    const g=toEUR(a.unidades*(a.precioActual-a.precioMedio),a.moneda);
    if(g>=0)gananciaLatente+=g; else perdidaLatente+=g;
  });
  const latNeto=gananciaLatente+perdidaLatente;
  const totalGanancia=resultadoNeto+gananciaLatente;
  const irpfPrevisto=calcIRPF(Math.max(0,totalGanancia));
  const netoPrevisto=totalGanancia-irpfPrevisto.tax;
  const netoReal=resultadoNeto-irpf.tax;
  const puedeCompensar=perdidaReal<0&&gananciaReal>0;
  const compensado=Math.min(Math.abs(perdidaReal),gananciaReal);

  function buildDonut(real,lat,hac,perd){
    const segs=[
      {v:Math.max(0,real),c:"#16a34a",l:"Realizado"},
      {v:Math.max(0,lat),c:"#3b82f6",l:"Latente"},
      {v:Math.max(0,Math.abs(hac)),c:"#dc2626",l:"Hacienda"},
      {v:Math.max(0,Math.abs(perd)),c:"#f97316",l:"Perdidas"},
    ].filter(s=>s.v>0);
    const tot=segs.reduce((a,s)=>a+s.v,0)||1;
    const cx=90,cy=90,r=70,ri=42;
    let angle=-Math.PI/2;
    const paths=segs.map(s=>{
      const a=(s.v/tot)*Math.PI*2;
      const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
      const x2=cx+r*Math.cos(angle+a),y2=cy+r*Math.sin(angle+a);
      const xi1=cx+ri*Math.cos(angle),yi1=cy+ri*Math.sin(angle);
      const xi2=cx+ri*Math.cos(angle+a),yi2=cy+ri*Math.sin(angle+a);
      const lg=a>Math.PI?1:0;
      const d=`M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${ri},${ri} 0 ${lg},0 ${xi1.toFixed(1)},${yi1.toFixed(1)} Z`;
      angle+=a;
      return`<path d="${d}" fill="${s.c}" opacity=".9"/>`;
    }).join("");
    const legend=segs.map(s=>`<div style="display:flex;align-items:center;gap:6px;font-size:11px"><div style="width:10px;height:10px;border-radius:2px;background:${s.c};flex-shrink:0"></div><span style="color:var(--muted)">${s.l}</span><span class="n" style="font-weight:700;margin-left:auto">${fC(s.v)}</span></div>`).join("");
    const nd=netoReal>=0?"+"+fC(netoReal):"-"+fC(Math.abs(netoReal));
    return`<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
      <div style="flex-shrink:0"><svg width="180" height="180" viewBox="0 0 180 180">
        ${paths}<circle cx="${cx}" cy="${cy}" r="${ri}" fill="#fff"/>
        <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="11" fill="#6b7280" font-family="Inter">Neto real</text>
        <text x="${cx}" y="${cy+11}" text-anchor="middle" font-size="13" font-weight="700" fill="${netoReal>=0?"#16a34a":"#dc2626"}" font-family="Roboto Mono">${nd}</text>
      </svg></div>
      <div style="flex:1;min-width:160px;display:flex;flex-direction:column;gap:8px">${legend}</div>
    </div>`;
  }

  function buildTramos(ganancia){
    const TRAMOS=[
      {desde:0,hasta:6000,tipo:19},
      {desde:6000,hasta:50000,tipo:21},
      {desde:50000,hasta:200000,tipo:23},
      {desde:200000,hasta:300000,tipo:27},
      {desde:300000,hasta:Infinity,tipo:28}
    ];
    let resto=Math.max(0,ganancia);
    return TRAMOS.map(t=>{
      const cap=t.hasta===Infinity?Infinity:t.hasta-t.desde;
      const base=t.hasta===Infinity?resto:Math.min(resto,cap);
      const impuesto=base>0?base*t.tipo/100:0;
      resto=Math.max(0,resto-base);
      const activo=base>0,lleno=t.hasta!==Infinity&&base>=cap;
      const pct2=t.hasta===Infinity?0:Math.min(100,cap>0?base/cap*100:0);
      const barColor=lleno?"#dc2626":pct2>=90?"#d97706":pct2>=70?"#f59e0b":"#16a34a";
      const estado=lleno?"lleno":pct2>=90?"critico":pct2>=70?"alerta":activo?"en curso":"sin tocar";
      return{...t,base,impuesto,activo,lleno,pct:pct2,barColor,estado,capacidad:cap};
    });
  }

  const tramosReal=buildTramos(resultadoNeto);
  const tramosPrev=buildTramos(totalGanancia);
  const tramoActual=tramosReal.find(t=>t.activo&&!t.lleno)||null;
  const tramoAlertaColor=tramoActual?.pct>=90?"#dc2626":tramoActual?.pct>=70?"#d97706":"#16a34a";

  const byYear={};
  salesAll.forEach(s=>{const y=(s.date||"").slice(0,4)||"?";if(!byYear[y])byYear[y]=[];byYear[y].push(s);});

  return`${tip("🏛️","<b>Real</b>: ya vendido y cerrado este año. <b>Previsto</b>: si vendieras todo ahora mismo. <b>Hacienda</b>: estimación según tramos del ahorro (no es asesoramiento fiscal). Las <b>pérdidas realizadas</b> compensan ganancias del mismo año (y los próximos 4 años fiscales).")}
  <div style="max-width:820px">
