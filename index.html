    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      <div class="card" style="padding:20px">
        <div style="font-size:9px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--subtle);margin-bottom:14px">Distribucion ${year}</div>
        ${buildDonut(gananciaReal,gananciaLatente,irpf.tax,perdidaReal)}
      </div>
      <div class="card" style="padding:20px">
        <div style="font-size:9px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--subtle);margin-bottom:14px">Previsto si vendes todo ahora</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${[["Ganancia realizada",resultadoNeto,"var(--green)"],["Ganancia latente abierta",latNeto,"var(--blue)"],["Total bruto",totalGanancia,"var(--text)"],["Hacienda estimada total",-irpfPrevisto.tax,"var(--red)"],["Neto total previsto",netoPrevisto,"var(--green)"]].map(([l,v,c])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;color:var(--muted)">${l}</span><span class="n" style="font-size:13px;font-weight:700;color:${c}">${v>=0?"+":""}${fC(v)}</span></div>`).join("")}
        </div>
      </div>
    </div>
    <div class="card" style="padding:20px;margin-bottom:14px">
      <div style="font-size:9px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--subtle);margin-bottom:8px">Tramos IRPF - Base del ahorro ${year}</div>
      ${tramoActual?`<div style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;margin-bottom:16px;background:${tramoActual.pct>=90?"#fef2f2":tramoActual.pct>=70?"#fffbeb":"#f0fdf4"};border:1px solid ${tramoAlertaColor}22">
        <span style="font-size:22px">${tramoAlertaEmoji}</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:${tramoAlertaColor}">Estas en el tramo del ${tramoActual.tipo}%</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">
            ${tramoActual.pct>=90?`Casi en el limite - te quedan ${fC((tramoActual.capacidad||0)-tramoActual.base)} para el siguiente tramo`:
              tramoActual.pct>=70?`Llevas el ${fN(tramoActual.pct,0)}% del tramo - te quedan ${fC((tramoActual.capacidad||0)-tramoActual.base)}`:
              `Llevas ${fC(tramoActual.base)} de ${fC(tramoActual.capacidad||0)} en este tramo`}
          </div>
        </div>
      </div>`:""}
      <div style="display:flex;flex-direction:column;gap:12px">
        ${tramosReal.map((t,i)=>{
          const tp=tramosPrev[i];
          const label=t.hasta===Infinity?`Mas de ${fC(t.desde)}`:`${fC(t.desde)} - ${fC(t.hasta)}`;
          return`<div style="opacity:${t.activo?1:0.45}">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;flex-wrap:wrap;gap:4px">
              <div style="display:flex;align-items:center;gap:8px">

              </div>
              <div class="n" style="font-size:12px">${t.activo?`<b>${fC(t.base)}</b> impuesto <b style="color:var(--red)">${fC(t.impuesto)}</b>`:"Sin ganancias"}</div>
            </div>
            ${t.hasta!==Infinity?`<div style="position:relative;height:14px;background:#f0f0e8;border-radius:7px;overflow:hidden;margin-bottom:3px">

              ${t.pct>0?`<div style="position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:700;color:${t.pct>60?"#fff":t.barColor}">${fN(t.pct,0)}%</div>`:""}

              <span>${fC(t.hasta)}</span>
            </div>`:"<div style='font-size:11px;color:var(--muted);padding:4px 0'>Sin limite superior</div>"}

      </div>

        <div><div style="font-size:10px;color:var(--subtle);margin-bottom:3px">TOTAL HACIENDA REAL</div><div class="n" style="font-size:18px;font-weight:800;color:var(--red)">${fC(irpf.tax)}</div><div style="font-size:11px;color:var(--muted)">sobre ${fC(resultadoNeto)}</div></div>
        <div style="text-align:right"><div style="font-size:10px;color:var(--subtle);margin-bottom:3px">TOTAL HACIENDA PREVISTO</div><div class="n" style="font-size:18px;font-weight:800;color:var(--blue)">${fC(irpfPrevisto.tax)}</div><div style="font-size:11px;color:var(--muted)">si vendieras todo</div></div>
      </div>
    </div>
    ${perdidaReal<0?`<div class="card" style="padding:16px 20px;margin-bottom:14px">
      <div style="font-size:9px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--subtle);margin-bottom:8px">Compensacion de perdidas</div>
      ${puedeCompensar
        ?`<div style="font-size:13px">Tienes <b style="color:var(--red)">${fC(Math.abs(perdidaReal))}</b> en perdidas que compensan <b style="color:var(--green)">${fC(compensado)}</b>. Base reducida a <b>${fC(Math.max(0,resultadoNeto))}</b>.</div>`
        :`<div style="font-size:13px;color:var(--muted)">Perdidas de <b style="color:var(--red)">${fC(Math.abs(perdidaReal))}</b> sin ganancias. Puedes compensarlas en los proximos <b>4 anos fiscales</b>.</div>`}
    </div>`:""}

      ${Object.keys(byYear).length===0
        ?`<div style="padding:36px;text-align:center;color:var(--muted);font-size:13px">Sin ventas registradas. Usa el boton Vender para registrarlas.</div>`

                <th style="text-align:right;padding:7px 12px;font-size:9px;color:var(--subtle);text-transform:uppercase">IRPF est.</th>
              </tr></thead>
              <tbody>${ySales.map(s=>{
                const g=s.gainEur??toEUR(s.unitsSold*s.priceSold,s.moneda)-toEUR(s.unitsSold*(s.avgPriceAtSale||0),s.moneda);
                return`<tr>
                  <td style="padding:8px 12px;border-bottom:1px solid #f2f2ea">${s.date||"—"}</td>
                  <td style="padding:8px 12px;border-bottom:1px solid #f2f2ea"><b>${s.assetName||"—"}</b></td>
                  <td style="padding:8px 12px;border-bottom:1px solid #f2f2ea;font-size:11px;color:var(--muted)">${platBy(s.platId||"tr").name}</td>
                  <td class="n" style="text-align:right;padding:8px 12px;border-bottom:1px solid #f2f2ea">${fN(s.unitsSold||0,4)}</td>
                  <td class="n" style="text-align:right;padding:8px 12px;border-bottom:1px solid #f2f2ea;color:var(--muted)">${fmt(s.avgPriceAtSale||0,s.moneda||"EUR")}</td>
                  <td class="n" style="text-align:right;padding:8px 12px;border-bottom:1px solid #f2f2ea">${fmt(s.priceSold||0,s.moneda||"EUR")}</td>
                  <td class="n ${pcl(g)}" style="text-align:right;padding:8px 12px;border-bottom:1px solid #f2f2ea;font-weight:700">${g>=0?"+":""}${fC(g)}</td>
                  <td class="n" style="text-align:right;padding:8px 12px;border-bottom:1px solid #f2f2ea;color:var(--red)">${g>0?fC(calcIRPF(g).tax):"—"}</td>
                </tr>`;
              }).join("")}</tbody>
            </table></div>`;
          }).join("")
      }
    </div>
    <div style="font-size:11px;color:var(--subtle);margin-top:12px;padding:10px">Cifras orientativas. No es asesoramiento fiscal. Consulta con un profesional.</div>
  </div>`;
}

function buildObjetivos(){
  const isGlobal=ACTIVE_PROFILE==="global";
  const T=totals();
  const valorActual=T.totalAssets;
  const cfg={
    fechaInicio:S.objConfig?.fechaInicio||"2026-05-01",
    aportacionMensual:S.objConfig?.aportacionMensual??4000,
    rentabilidadAnual:S.objConfig?.rentabilidadAnual??15,
    margenRetiro:S.objConfig?.margenRetiro??10,
    porcentajeRetiro:S.objConfig?.porcentajeRetiro??10,
    retiradaFrecuencia:S.objConfig?.retiradaFrecuencia||"mensual",
    retiradaCantidad:S.objConfig?.retiradaCantidad??0,
  };
  const rentMensual=(1+cfg.rentabilidadAnual/100)**(1/12)-1;
  const freqMult={mensual:1,trimestral:1/3,semestral:1/6,anual:1/12};
  const retiradaMensual=(cfg.retiradaCantidad||0)*(freqMult[cfg.retiradaFrecuencia]||1);
  const snaps=(S.portfolioSnapshots||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  // Capital de inicio: 1) snapshot exacto, 2) snapshot cercano (±30 días), 3) valor actual con aviso
  let snapInicio=null,snapTipo="actual";
  if(snaps.length){
    const exacto=snaps.find(s=>s.date===cfg.fechaInicio);
    if(exacto){snapInicio=exacto;snapTipo="exacto";}
    else{
      const inicioMs=new Date(cfg.fechaInicio).getTime();
      const cercanos=snaps.map(s=>({s,diff:Math.abs(new Date(s.date).getTime()-inicioMs)}))
        .filter(x=>x.diff<=30*86400000).sort((a,b)=>a.diff-b.diff);
      if(cercanos.length){snapInicio=cercanos[0].s;snapTipo="cercano";}
      else{
        // Buscar el más antiguo que sea posterior al inicio (para no usar uno muy lejano del futuro)
        const post=snaps.find(s=>s.date>=cfg.fechaInicio);
        if(post){snapInicio=post;snapTipo="posterior";}
      }
    }
  }
  const capitalInicio=snapInicio?.value??valorActual;
  const hoy=new Date(),inicio=new Date(cfg.fechaInicio);
  const mesesTranscurridos=Math.max(0,(hoy.getFullYear()-inicio.getFullYear())*12+(hoy.getMonth()-inicio.getMonth()));

  function proyectar(meses,conRetiro=false){
    const r=rentMensual,ap=cfg.aportacionMensual-(conRetiro?retiradaMensual:0);
    if(r===0)return capitalInicio+ap*meses;
    return capitalInicio*Math.pow(1+r,meses)+ap*(Math.pow(1+r,meses)-1)/r;
  }
  function mesesHasta(objetivo,conRetiro=false){
    if(valorActual>=objetivo)return 0;
    const ap=cfg.aportacionMensual-(conRetiro?retiradaMensual:0);
    let v=valorActual,m=0;
    while(v<objetivo&&m<600){v=v*(1+rentMensual)+ap;m++;}
    return m;
  }

  const valorProyHoy=proyectar(mesesTranscurridos,false);
  const diff=valorActual-valorProyHoy;
  const diffPct=valorProyHoy>0?diff/valorProyHoy*100:0;
  const aportacionesAcum=cfg.aportacionMensual*mesesTranscurridos;
  const baseTotal=capitalInicio+aportacionesAcum;
  const gananciaAbsoluta=valorActual-baseTotal;

  const maxRetiroAnual=valorActual*(cfg.porcentajeRetiro/100);
  const maxRetiroMensual=maxRetiroAnual/12;
  const maxRetiroTrimestral=maxRetiroAnual/4;

  function buildDonutObj(){
    const segs=[

      angle+=a;return`<path d="${d}" fill="${s.c}" opacity=".88"/>`;

    const rentColor=gananciaAbsoluta>=0?"#16a34a":"#dc2626";
    return`<div style="display:flex;align-items:center;gap:22px;flex-wrap:wrap">
      <div style="flex-shrink:0"><svg width="190" height="190" viewBox="0 0 190 190">${paths}<circle cx="${cx}" cy="${cy}" r="${ri}" fill="white"/>
        <text x="${cx}" y="${cy-14}" text-anchor="middle" font-size="10" fill="#6b7280" font-family="Inter,sans-serif">Rentabilidad</text>
        <text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="16" font-weight="800" fill="${rentColor}" font-family="Roboto Mono,monospace">${gananciaAbsoluta>=0?"+":""}${fN(gananciaRentPct,1)}%</text>

      </svg></div>
      <div style="flex:1;min-width:150px">${legend}</div>
    </div>`;
  }

  const IS=`background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);font-family:'Roboto Mono',monospace;width:100%`;

    </div>
    <div style="background:#fafaf8;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px">

  const retPanel=cfg.retiradaCantidad>0?`<div class="card" style="padding:20px;margin-bottom:16px;border-left:5px solid ${dentroDelLimite?"#16a34a":"#dc2626"}">

  const semaforoPanel=`<div class="card" style="padding:22px;margin-bottom:16px;border-left:5px solid ${semColor};background:${semColor}08">

        <div class="n" style="font-size:13px;font-weight:700;color:${gananciaAbsoluta>=0?"#16a34a":"#dc2626"};margin-top:3px">${gananciaAbsoluta>=0?"+":""}${fC(gananciaAbsoluta)}</div>

  const mesesTabla=[];
  for(let m=Math.max(0,mesesTranscurridos-6);m<=mesesTranscurridos+12;m++){
    const fecha=new Date(inicio);fecha.setMonth(fecha.getMonth()+m);
    const proy=proyectar(m,false),proyConRet=cfg.retiradaCantidad>0?proyectar(m,true):null;
    const esHoy=m===mesesTranscurridos,esFuturo=m>mesesTranscurridos;
    const mesStr=fecha.toISOString().slice(0,7);
    const snapMes=snaps.find(s=>s.date.startsWith(mesStr));
    const mesAntStr=new Date(fecha.getFullYear(),fecha.getMonth()-1,1).toISOString().slice(0,7);
    const snapAnt=snaps.find(s=>s.date.startsWith(mesAntStr));
    const gainMes=snapMes&&snapAnt?snapMes.value-snapAnt.value:null;
    const gainMesPct=gainMes!=null&&snapAnt?.value?gainMes/snapAnt.value*100:null;
    const real=esHoy?valorActual:(!esFuturo&&snapMes?.value)||null;
    mesesTabla.push({m,fecha,proy,proyConRet,esHoy,esFuturo,gainMes,gainMesPct,real});
  }

  const tablaPanel=`<div class="card" style="overflow:hidden;margin-bottom:16px">
    <div style="padding:12px 18px;background:#fafaf8;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <div style="font-size:9px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--subtle)">Proyeccion mes a mes</div>
      <div style="font-size:11px;color:var(--muted)">Verde = por encima del plan - Rojo = por debajo</div>
    </div>
    <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;min-width:600px">
      <thead><tr style="background:#fafaf8">
        <th style="padding:8px 12px;text-align:left;font-size:9px;text-transform:uppercase;color:var(--subtle)">Mes</th>
        <th style="padding:8px 12px;text-align:right;font-size:9px;text-transform:uppercase;color:var(--subtle)">Proyectado</th>
        ${cfg.retiradaCantidad>0?`<th style="padding:8px 12px;text-align:right;font-size:9px;text-transform:uppercase;color:var(--subtle)">Con retiro</th>`:""}
        <th style="padding:8px 12px;text-align:right;font-size:9px;text-transform:uppercase;color:var(--subtle)">Real</th>
        <th style="padding:8px 12px;text-align:right;font-size:9px;text-transform:uppercase;color:var(--subtle)">Ganancia mes</th>
        <th style="padding:8px 12px;text-align:right;font-size:9px;text-transform:uppercase;color:var(--subtle)">Vs plan</th>
      </tr></thead>
      <tbody>${mesesTabla.map(({m,fecha,proy,proyConRet,esHoy,esFuturo,gainMes,gainMesPct,real})=>{
        const dif=real!=null?real-proy:null;
        return`<tr style="background:${esHoy?"#eff6ff":esFuturo?"#fafaf8":"#fff"};${esHoy?"font-weight:700":""}">
          <td style="padding:8px 12px;border-bottom:1px solid #f2f2ea">
            ${esHoy?`<span style="background:var(--blue);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;margin-right:4px">HOY</span>`:""}
            ${esFuturo?`<span style="font-size:9px;color:var(--subtle);margin-right:3px">→</span>`:""}
            ${fecha.toLocaleDateString("es-ES",{month:"short",year:"numeric"})}
          </td>
          <td class="n" style="padding:8px 12px;border-bottom:1px solid #f2f2ea;text-align:right">${fC(proy)}</td>
          ${cfg.retiradaCantidad>0?`<td class="n" style="padding:8px 12px;border-bottom:1px solid #f2f2ea;text-align:right;color:#d97706">${fC(proyConRet)}</td>`:""}
          <td class="n" style="padding:8px 12px;border-bottom:1px solid #f2f2ea;text-align:right;color:${esHoy?"var(--blue)":esFuturo?"var(--subtle)":"var(--text)"}">${real!=null?fC(real):"—"}</td>
          <td style="padding:8px 12px;border-bottom:1px solid #f2f2ea;text-align:right">
            ${gainMes!=null?`<div class="n" style="font-size:12px;font-weight:700;color:${gainMes>=0?"#16a34a":"#dc2626"}">${gainMes>=0?"+":""}${fC(gainMes)}</div><div class="n" style="font-size:10px;color:${gainMes>=0?"#16a34a":"#dc2626"}">${gainMesPct>=0?"+":""}${fN(gainMesPct,2)}%</div>`:`<span style="color:var(--subtle)">—</span>`}
          </td>
          <td class="n" style="padding:8px 12px;border-bottom:1px solid #f2f2ea;text-align:right;font-weight:700;color:${dif!=null?(dif>=0?"#16a34a":"#dc2626"):"var(--subtle)"}">${dif!=null?(dif>=0?"+":"")+fC(dif):"—"}</td>
        </tr>`;
      }).join("")}</tbody>
    </table></div>
  </div>`;

  return`${tip("🎯","El plan se alimenta automaticamente del portfolio. La <b>aportacion mensual</b> es informativa. La <b>rentabilidad anual</b> es una hipotesis. La <b>retirada segura</b> depende del valor actual y del margen. Los <b>hitos</b> no significan vender — solo sirven como control.")}
  <div style="max-width:1050px">
    ${configPanel}
    ${semaforoPanel}
    ${retPanel}
    ${donutPanel}
    <div style="font-size:9px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--subtle);margin-bottom:12px">Hitos y retiros por nivel</div>
    ${hitosPanel}
    ${tablaPanel}
  </div>`;
}


// ── FOTO IA ────────────────────────────────────────────────────────
function buildFoto(){
  const fs=S.fotoState||{status:"idle",result:null,platId:"auto",previewUrl:null};
  const IS=`background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--text);width:100%`;
  const statusBlock=()=>{
    if(fs.status==="loading")return`<div style="text-align:center;padding:30px;color:var(--muted)"><div style="font-size:32px;margin-bottom:10px;animation:spin 1s linear infinite;display:inline-block">⚙️</div><div style="font-weight:600;font-size:14px;margin-bottom:4px">Analizando con IA...</div><div style="font-size:12px">Detectando plataforma, activos y cantidades</div></div>`;
    if(fs.status==="error")return`<div class="notice n-err" style="margin-top:14px">❌ ${fs.error||"Error al analizar"}</div>`;
    if(fs.status==="done"&&fs.result)return buildFotoResult(fs.result);
    return"";
  };
  return`${tip("📸","Sube una captura de tu plataforma y la IA detecta los activos. Funciona mejor con capturas nítidas. Los activos se añaden a la sección <b>Activos</b> de la plataforma elegida (no a Liquidez ni Extras).")}
  <style>@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}</style>
  <div style="max-width:580px">
    <div class="card" style="padding:26px;margin-bottom:14px">
      <div style="font-size:9px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--subtle);margin-bottom:6px">📸 Analizar foto con IA</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.6">Sube una captura de pantalla — la IA detecta los activos y los añade automáticamente.</div>
      <div class="fg"><label class="fl">Plataforma destino</label>
        <select id="foto-plat" style="${IS}">
          <option value="auto"${fs.platId==="auto"?" selected":""}>🔍 Detectar automáticamente</option>
          ${PLATS.map(p=>`<option value="${p.id}"${fs.platId===p.id?" selected":""}>${p.emoji} ${p.name}</option>`).join("")}
        </select>
      </div>
      <div style="background:#f8f8f4;border:2px dashed var(--border);border-radius:var(--r);padding:24px 20px;text-align:center;margin-bottom:14px">
        ${fs.previewUrl?`<img src="${fs.previewUrl}" style="max-height:180px;max-width:100%;border-radius:8px;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto"/><div style="font-size:13px;color:var(--blue);font-weight:600;margin-bottom:12px">📸 Imagen cargada — analizando...</div>`:`<div style="font-size:40px;margin-bottom:8px">📸</div><div style="font-weight:700;font-size:15px;color:var(--text);margin-bottom:4px">Sube una captura</div><div style="font-size:12px;color:var(--muted);margin-bottom:12px">La IA detectará los activos</div>`}
        <input type="file" id="foto-file-global" accept="image/*" style="font-size:16px;padding:8px;display:block;margin:0 auto;max-width:280px"/>
      </div>
      ${statusBlock()}
    </div>
  </div>`;
}
function buildFotoResult(result){
  if(!result.assets||!result.assets.length)return`<div class="notice n-warn" style="margin-top:14px">⚠️ No se detectaron activos claros.</div>`;
  const platId=result.platId||S.fotoState.platId||"binance";
  const plat=platBy(platId);
  const cdcSubSel=platId==="cdc"?`<div style="margin-bottom:12px;padding:10px;background:var(--bbg);border:1px solid var(--bborder);border-radius:8px"><label class="fl" style="margin-bottom:6px">Sub-cuenta destino:</label><select id="foto-cdc-sub" style="background:#fff;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;width:100%">${CDC_SUBS.map(s=>`<option value="${s.id}">${s.emoji} ${s.name}</option>`).join("")}</select></div>`:"";
  return`<div style="margin-top:16px">
    <div style="font-size:9px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--subtle);margin-bottom:10px">✅ Detectado: ${plat.emoji} ${result.platformName||plat.name}${result.totalValue?`<span style="color:var(--muted);font-weight:500;font-size:11px;margin-left:8px">Total: ${result.totalValue}</span>`:""}</div>
    ${cdcSubSel}
    <div class="card" style="overflow:hidden;margin-bottom:12px;overflow-x:auto"><div style="min-width:560px">
      <div class="th" style="grid-template-columns:1.5fr 1fr 1fr 1fr auto"><span>Activo</span><span style="text-align:right">Cantidad</span><span style="text-align:right">Precio</span><span style="text-align:right">Valor</span><span></span></div>
      ${result.assets.map((a,i)=>{
        const needsReview=a.needsReview||a.units==="revisar"||a.units===null||a.units===0;
        return`<div class="tr" style="grid-template-columns:1.5fr 1fr 1fr 1fr auto;${needsReview?"background:var(--abg)":""}">
        <div><div style="font-size:13px;font-weight:700">${a.name||"?"}${needsReview?` <span style="font-size:10px;color:var(--amber)">⚠️ revisar</span>`:""}</div><div style="font-size:10px;color:var(--subtle)">${a.symbol||"?"}</div></div>
        <div class="n" style="font-size:13px;font-weight:600;text-align:right">${a.units!==null&&a.units!=="revisar"?a.units:"⚠️"}</div>
        <div class="n" style="font-size:13px;text-align:right;color:var(--muted)">${a.price||"—"}</div>
        <div class="n" style="font-size:13px;font-weight:700;text-align:right">${a.value||"—"}</div>
        <input type="checkbox" id="foto-check-${i}" ${needsReview?"":"checked"} style="width:16px;height:16px;cursor:pointer;accent-color:var(--green)"/></div>`;
      }).join("")}
    </div></div>
    <div class="notice n-info" style="margin-bottom:10px">⚠️ Estos activos se añadirán como <b>nuevas posiciones</b>. Si ya tienes ese activo, considera usar <b>Comprar</b> desde la plataforma para promediar correctamente con tu liquidez.</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button onclick="addFotoAssets()" class="btn btn-green" style="flex:1;padding:11px">✅ Añadir al portfolio</button>
      <button onclick="resetFoto()" class="btn btn-sm" style="padding:11px 16px">🔄 Nueva foto</button>
    </div>
    ${S.fotoState.addedMsg?`<div class="notice n-ok" style="margin-top:10px">✅ ${S.fotoState.addedMsg}</div>`:""}
  </div>`;
}

  bindEvents();

//================================================================
// EVENTS
//================================================================
function bindEvents(){
  const mo=document.getElementById("mo");
  if(mo)mo.onclick=e=>{if(e.target===mo)closeModal();};

  document.querySelectorAll("[data-act]").forEach(el=>{
    const act=el.dataset.act;
    if(act==="moneda")    el.onclick=()=>{S.moneda=el.dataset.val;saveState();render();};
    if(act==="periodo")   el.onclick=()=>{S.periodo=el.dataset.val;render();};
    if(act==="tab")       el.onclick=()=>{S.tab=el.dataset.val;render();};
    if(act==="goto-plat") el.onclick=()=>{S.tab="plataformas";render();};

    if(act==="reset-step1") el.onclick=()=>modal({
      title:"⚠️ ¿Borrar todos los datos?",
      body:"Se eliminarán <strong>todas</strong> las plataformas, activos, extras, liquidez, capital, ventas y objetivos. Esto no se puede deshacer.",
      ok:"Sí, continuar",danger:true,action:"resetStep2()"
    });

    if(act==="del-asset") el.onclick=()=>{
      const pid=el.dataset.pid,sub=el.dataset.sub||null,aid=el.dataset.aid;
      modal({title:"¿Eliminar activo?",body:"Se elimina sin registrar venta (no afecta a Hacienda). Si quieres registrar la venta y devolver el dinero a Liquidez, usa <b>Vender</b> en su lugar.",
        ok:"Eliminar",danger:true,action:`doDelAsset(${JSON.stringify(pid)},${JSON.stringify(sub)},${JSON.stringify(aid)})`});
    };
    if(act==="del-extra") el.onclick=()=>{
      const pid=el.dataset.pid,sub=el.dataset.sub||null,eid=el.dataset.eid;
      modal({title:"¿Eliminar extra?",body:"Se elimina del cajón Extras. Si quieres convertirlo en liquidez, usa <b>Cobrar</b> en su lugar.",
        ok:"Eliminar",danger:true,action:`doDelExtra(${JSON.stringify(pid)},${JSON.stringify(sub)},${JSON.stringify(eid)})`});
    };
    if(act==="del-capital") el.onclick=()=>{
      const id=el.dataset.id;
      modal({title:"¿Eliminar movimiento?",body:"Se eliminará este movimiento de capital.",ok:"Eliminar",danger:true,action:`doDelCapital('${id}')`});
    };
    if(act==="del-obj") el.onclick=()=>{
      const id=el.dataset.id;
      modal({title:"¿Eliminar objetivo?",body:"Se eliminará este objetivo.",ok:"Eliminar",danger:true,action:`doDelObj('${id}')`});
    };

    if(act==="add-capital") el.onclick=()=>{
      const f=S.capForm;
      const amt=parseDec(f.amount);
      if(!amt||!f.concept||!f.date){
        modal({title:"Campos incompletos",body:"Rellena fecha, cantidad y concepto.",ok:"Entendido",action:"closeModal()"});
        return;
      }
      const newM={id:uid(),date:f.date,type:f.type,amount:Math.abs(amt),concept:f.concept,platform:f.platform||"general"};
      S.capitalMovements=[...(S.capitalMovements||[]),newM];
      S._capOwned=true;
      S.capForm={...S.capForm,amount:"",concept:""};
      S.capMsg=`${f.type==="in"?"Aportación":"Retirada"} de ${fC(newM.amount)} registrada`;
      saveState();render();
      setTimeout(()=>{S.capMsg="";render();},4000);
    };

  });

  // ── Precios y extras: SOLO se guardan al pulsar ✓ o Enter ──
  // Los handlers de guardado están en window._bindPriceButtons / _bindExtraValButtons,
  // que se llaman al final de bindEvents(). NO se enlaza onchange aquí para evitar
  // que el input se "guarde" al perder foco (mala UX en móvil).

  // Form sync para capital y objetivos
  document.querySelectorAll("[data-cf]").forEach(el=>{
    el.oninput=el.onchange=()=>{
      S.capForm[el.dataset.cf]=el.value;
      if(el.dataset.cf==="type")render();
    };
  });
  // Foto file input
  const fotoFile=document.getElementById("foto-file-global");
  if(fotoFile){
    fotoFile.onchange=e=>{
      const file=e.target.files[0];if(!file)return;
      handleFotoFile(file);
    };
  }
  const fotoPlatSel=document.getElementById("foto-plat");
  if(fotoPlatSel){
    fotoPlatSel.onchange=e=>{

async function analyzeImageWithAI(base64,mediaType,platId){
  const plat=platId==="auto"?null:platBy(platId);
  const platHint=plat?`La plataforma es ${plat.name} (${plat.tipo}).`:"Detecta automáticamente qué plataforma es.";
  const prompt=`Eres un experto en finanzas analizando una captura de pantalla. Extrae los activos visibles con MÁXIMA PRECISIÓN.

${platHint}

INSTRUCCIONES:
1. Extrae TODOS los activos visibles
2. Para cada activo: nombre completo, símbolo/ticker, cantidad EXACTA con decimales, precio actual, valor total
3. Si un campo no se ve claro, marca "needsReview": true y pon "revisar" en ese campo
4. Para cripto presta atención a las cantidades con muchos decimales

Devuelve SOLO JSON válido sin texto extra ni backticks:
{
  "platformName": "nombre detectado",
  "platId": "tr|binance|kucoin|cdc|bingx|margex|metamask|ledger|helium|auto",
  "totalValue": "valor total si aparece",
  "currency": "USD o EUR",
  "assets": [{"name":"...","symbol":"...","units":0.0,"price":"...","value":"...","needsReview":false}]
}

REGLAS:
- "units" debe ser NÚMERO con punto decimal, no string
- Si no se ve, "units":"revisar" y "needsReview":true
- Solo JSON, nada más.`;

  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1500,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:mediaType,data:base64}},
          {type:"text",text:prompt}
        ]}]
      })
    });
    if(!resp.ok)throw new Error(`API error: ${resp.status}`);
    const data=await resp.json();
    const text=data.content.map(c=>c.text||"").join("").trim();
    const clean=text.replace(/```json|```/g,"").trim();
    const result=JSON.parse(clean);
    const finalPlatId=result.platId&&result.platId!=="auto"?result.platId:(platId!=="auto"?platId:"binance");
    result.platId=finalPlatId;
    S.fotoState={...S.fotoState,status:"done",result,addedMsg:""};
    render();
  }catch(e){
    console.error(e);
    S.fotoState={...S.fotoState,status:"error",error:"No se pudo analizar la imagen. Intenta con una captura más clara."};
    render();
  }
}

window.importarDatos=()=>{
  const input=document.createElement("input");
  input.type="file";input.accept=".json";
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const backup=JSON.parse(ev.target.result);
        if(!backup._perfiles)throw new Error("Formato no válido");
        Object.entries(backup._perfiles).forEach(([pid,data])=>{
          // Si el backup es v1, migrar; si es v2, guardar tal cual
          if(backup._version==="v2"||data.platforms){
            localStorage.setItem(`${KEY_BASE}_${pid}`,JSON.stringify(data));
          }else{
            // v1 backup → migrar
            const platforms=migrateOldData(data)||emptyPlatforms();
            const migrated={...getBaseState(pid),platforms,
              capitalMovements:data.capitalMovements||[],
              realizedSales:data.realizedSales||[],
              objetivos:data.objetivos||[],
              _capOwned:!!data._capOwned,
              moneda:data.moneda||"EUR",
            };
            localStorage.setItem(`${KEY_BASE}_${pid}`,JSON.stringify(migrated));
          }
        });
        S=ACTIVE_PROFILE==="global"?loadGlobalState():loadState();
        render();showToast("✅ Datos restaurados");
      }catch(err){alert("❌ Error: "+err.message);}
    };
    r.readAsText(file);
  };
  input.click();
};

  const snaps=S.portfolioSnapshots||[];
  if(snaps.length>0&&snaps[snaps.length-1].date===today2)return;
  const T=totals();
  const value=T.totalAssets;
  if(value<=0)return;
  if(!S.portfolioSnapshots)S.portfolioSnapshots=[];
  S.portfolioSnapshots.push({date:today2,value});
  // Mantener máximo 730 snapshots (2 años)
  if(S.portfolioSnapshots.length>730)S.portfolioSnapshots=S.portfolioSnapshots.slice(-730);
}

      </div>`;
    };
    eI&&eI.addEventListener("input",upd);
    eP&&eP.addEventListener("input",upd);
    document.getElementById("v-moneda")?.addEventListener("change",upd);
    document.getElementById("v-pcompra")?.addEventListener("input",upd);
    upd();
  },50);

window.confirmarVentaNew=(platId,subId,assetId)=>{
  const precio=parseDec(document.getElementById("v-precio").value);
  const importeRaw=parseDec(document.getElementById("v-importe").value);
  const monedaCobro=(document.getElementById("v-moneda")||{}).value||platBy(platId).base||"EUR";
  const fecha=document.getElementById("v-fecha").value||today();
  if(!precio){alert("Introduce el precio de venta");return;}
  const b=getBucket(S,platId,subId||null);
  const asset=(b.assets||[]).find(a=>a.id===assetId);
  if(!asset){alert("Activo no encontrado");return;}
  const importe=importeRaw>0?importeRaw:asset.unidades*precio;
  const unidadesVender=Math.min(importe/precio,asset.unidades);
  const r=opVender(platId,subId,assetId,{unidadesVender,precioVenta:precio,monedaCobro,fecha});
  if(!r.ok){alert("❌ "+r.error);return;}
  saveState();closeModal();render();
  const q=asset.unidades-unidadesVender;
  showToast(q>0.000001?`✅ Vendido ${fN(unidadesVender,4)} ${asset.simbolo} · Quedan ${fN(q,4)}`
    :`✅ ${asset.simbolo} vendido · ${fmt(importe,monedaCobro)} a Liquidez`);
};

window.deletePlat=(platId)=>{
  const plat=getPlats().find(p=>p.id===platId);if(!plat)return;

    modal({title:`⚠️ ${plat.name} tiene saldo`,
      body:`No puedes eliminar <b>${plat.name}</b> porque tiene <b>liquidez o activos</b>. Traspasa los fondos a otra plataforma primero (con el botón Retirar / Comprar / Vender).`,
      ok:"Entendido",action:"closeModal()"});

    body:`¿Eliminar la plataforma <b>${plat.name}</b>? La plataforma está vacía, no se perderán datos.`,

// Traspasos
window.openTraspasoModal=(platId,subId)=>{
  const allPlats=getPlats();
  const origen=allPlats.find(p=>p.id===platId);
  const otrasPlats=allPlats.filter(p=>p.id!==platId);
  const bucket=getBucket(S,platId,subId);
  const activos=bucket.assets||[];
  const IS=`background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--text);width:100%;font-family:'Roboto Mono',monospace`;
  modal({html:`
    <h3>↔ Traspaso desde ${origen.emoji} ${origen.name}</h3>
    <div class="fg"><label class="fl">Tipo</label>
      <select id="tr-tipo" style="${IS}" onchange="toggleTraspasoTipoNew()">
        <option value="liq">💶 Liquidez (dinero)</option>
        ${activos.length>0?`<option value="asset">📦 Activo (cripto/acción)</option>`:""}
      </select>
    </div>
    <div id="tr-liq-section">
      <div class="fg"><label class="fl">Moneda</label>
        <select id="tr-moneda" style="${IS}">
          <option value="EUR">EUR € (disp: ${fmt(bucket.liquidity.eur||0,"EUR")})</option>
          <option value="USD">USD $ (disp: ${fmt(bucket.liquidity.usd||0,"USD")})</option>
        </select>
      </div>
      <div class="fg"><label class="fl">Cantidad enviada *</label><input id="tr-enviado" type="number" step="any" class="fi" placeholder="ej: 1000"/></div>
    </div>
    <div id="tr-asset-section" style="display:none">
      <div class="fg"><label class="fl">Activo</label><select id="tr-asset" style="${IS}">
        ${activos.map(a=>`<option value="${a.id}">${a.nombre} (${a.simbolo}) — ${fN(a.unidades,4)} uds</option>`).join("")}
      </select></div>
      <div class="fg"><label class="fl">Cantidad *</label><input id="tr-asset-qty" type="number" step="any" class="fi" placeholder="ej: 0.5"/></div>
    </div>
    <div class="fg"><label class="fl">Plataforma destino *</label>
      <select id="tr-destino" style="${IS}">${otrasPlats.map(p=>`<option value="${p.id}">${p.emoji} ${p.name}</option>`).join("")}</select>
    </div>
    <div class="fg"><label class="fl">Cantidad recibida en destino (puede ser menor por comisiones)</label>
      <input id="tr-recibido" type="number" step="any" class="fi" placeholder="ej: 998 (si hay comisión de 2)"/></div>
    <div class="fg"><label class="fl">Concepto (opcional)</label><input id="tr-concepto" type="text" class="fi" placeholder="ej: Bridge Ledger→Binance"/></div>
    <div class="mo-btns">
      <button class="btn btn-sm" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-dark" onclick="confirmarTraspasoNew('${platId}','${subId||""}')" style="padding:10px 18px">Confirmar traspaso</button>
    </div>
  `});
};
window.toggleTraspasoTipoNew=()=>{
  const tipo=(document.getElementById("tr-tipo")||{}).value;
  const l=document.getElementById("tr-liq-section"),a=document.getElementById("tr-asset-section");
  if(l)l.style.display=tipo==="liq"?"block":"none";
  if(a)a.style.display=tipo==="asset"?"block":"none";
};
window.confirmarTraspasoNew=(origenId,subId)=>{
  const tipo=(document.getElementById("tr-tipo")||{}).value||"liq";
  const destinoId=(document.getElementById("tr-destino")||{}).value;
  const concepto=(document.getElementById("tr-concepto")||{}).value?.trim()||"Traspaso";
  const destino=getPlats().find(p=>p.id===destinoId);
  if(tipo==="liq"){
    const moneda=(document.getElementById("tr-moneda")||{}).value||"EUR";
    const enviado=parseFloat((document.getElementById("tr-enviado")||{}).value||0);
    const recibido=parseFloat((document.getElementById("tr-recibido")||{}).value||enviado);
    if(!enviado||enviado<=0){alert("Introduce la cantidad enviada");return;}
    const bO=getBucket(S,origenId,subId||null);
    const disp=moneda==="EUR"?(bO.liquidity.eur||0):(bO.liquidity.usd||0);
    if(enviado>disp+0.001){alert(`Liquidez insuficiente. Disponible: ${fmt(disp,moneda)}`);return;}
    if(!S.platforms)S.platforms={};
    const ko=subId?`${origenId}_${subId}`:origenId;
    const kd=destinoId;
    // Obtener plataformas (nivel raíz para liquidez)
    const platOrig=S.platforms[origenId]||emptyPlatform(origenId);
    const platDest=S.platforms[destinoId]||emptyPlatform(destinoId);
    if(!platOrig.liquidity)platOrig.liquidity={eur:0,usd:0};
    if(!platDest.liquidity)platDest.liquidity={eur:0,usd:0};
    S.platforms[origenId]=platOrig;
    S.platforms[destinoId]=platDest;
    const f=moneda==="EUR"?"eur":"usd";
    platOrig.liquidity[f]=(platOrig.liquidity[f]||0)-enviado;
    platDest.liquidity[f]=(platDest.liquidity[f]||0)+recibido;
    const com=enviado-recibido;
    if(com>0.001){
      if(!platOrig.extras)platOrig.extras=[];
      platOrig.extras.push({id:uid(),nombre:`Comision traspaso → ${destino.name}`,simbolo:"FEE",unidades:1,valorUnitario:com,moneda,tipo:"extra",fecha:today()});
    }
  }
  saveState();closeModal();render();
  showToast(`✅ Traspaso a ${destino.name} completado`);
};

// Price confirm button handler - se llama desde render() a través de bindEvents existente
window._bindPriceButtons=()=>{
  document.querySelectorAll("[data-confirm-price]").forEach(btn=>{
    btn.onclick=(e)=>{
      e.stopPropagation();
      const wrap=btn.closest(".pinp-wrap")||btn.parentElement;
      const inp=wrap?wrap.querySelector(".pinp"):null;
      if(!inp)return;
      const v=parseDec(inp.value);
      if(!v||v<=0){inp.style.borderColor="var(--red)";return;}
      inp.style.borderColor="var(--green)";
      opUpdatePrice(btn.dataset.pid,btn.dataset.sub||null,btn.dataset.aid,v);
      saveState();btn.textContent="✅";
      setTimeout(()=>render(),600);
    };
  });
  document.querySelectorAll("[data-upd-price]").forEach(el=>{
    el.onkeydown=(e)=>{
      if(e.key==="Enter"){e.preventDefault();
        const b=el.parentElement?.querySelector("[data-confirm-price]");if(b)b.click();}
    };
  });
};

// ── Mover plataforma arriba/abajo en la lista ────────────────
window.opMovePlatUp=(platId)=>{
  if(!S.platsList)S.platsList=[...DEFAULT_PLATS];
  const idx=S.platsList.findIndex(p=>p.id===platId);
  if(idx<=0)return;
  [S.platsList[idx-1],S.platsList[idx]]=[S.platsList[idx],S.platsList[idx-1]];
  saveState();render();
};
window.opMovePlatDown=(platId)=>{
  if(!S.platsList)S.platsList=[...DEFAULT_PLATS];
  const idx=S.platsList.findIndex(p=>p.id===platId);
  if(idx<0||idx>=S.platsList.length-1)return;
  [S.platsList[idx],S.platsList[idx+1]]=[S.platsList[idx+1],S.platsList[idx]];
  saveState();render();
};

maybeAddPortfolioSnapshot();

render();
</script>
